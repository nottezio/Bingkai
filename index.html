<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#2A2A2A" />
<link rel="icon" href="data:," />
<title>Bingkai — Studio Foto</title>
<!--
  SCRL-style Photo Framing & Carousel PWA — single file, Android-first.
  Build phase: P2 (app shell · import · two-resolution pipeline · EXIF orientation).
  Code + comments: English. User-facing strings: Bahasa Indonesia (STRINGS).
  Dependencies: none yet (JSZip arrives in P5; service worker in P6).
-->
<style>
  /* ===== design tokens ===== */
  :root {
    --bg: #0E1014;          /* deep cool near-black behind the photo */
    --ink: #14171C;         /* solid chrome (topbar/toolbar base) */
    --glass: rgba(18,21,26,0.72);   /* frosted floating dock fill */
    --glass-2: rgba(26,30,37,0.66);
    --hair: rgba(255,255,255,0.10); /* top highlight hairline on glass */
    --panel: #14171C;       /* legacy alias */
    --panel-2: rgba(255,255,255,0.055);
    --line: rgba(255,255,255,0.085);
    --txt: #F4F5F7;
    --txt-dim: #8B919C;
    --accent: #4C9DFF;
    --accent-soft: rgba(76,157,255,0.16);
    --accent-ink: #06203F;
    --danger: #E5534B;
    --toolbar-h: 60px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --radius: 13px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--txt);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none; touch-action: manipulation;
  }
  #app { display: flex; flex-direction: column; height: 100%; }

  /* ===== top bar ===== */
  .topbar {
    flex: 0 0 auto; height: 50px; display: flex; align-items: center;
    gap: 10px; padding: 0 14px; background: var(--ink);
    border-bottom: 1px solid var(--line); padding-top: env(safe-area-inset-top, 0px);
  }
  .topbar .title { font-size: 16px; font-weight: 650; letter-spacing: -0.01em; }
  .topbar .spacer { flex: 1; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border-radius: 11px; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--txt); cursor: pointer;
    transition: background .12s ease;
  }
  .icon-btn:active { background: rgba(255,255,255,.12); }
  .icon-btn:disabled { opacity: .32; pointer-events: none; }
  .icon-btn svg { width: 20px; height: 20px; }

  /* ===== stage (photo area) sits ABOVE the control dock (non-overlapping) ===== */
  .stage-wrap { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; }

  /* ===== workspace ===== */
  .workspace {
    position: relative; flex: 1 1 auto; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(76,157,255,.05), transparent 60%),
      var(--bg);
    overflow: hidden;
  }
  #stage { display: block; max-width: 100%; max-height: 100%; touch-action: none;
    filter: drop-shadow(0 12px 28px rgba(0,0,0,.45)); }

  /* empty state */
  .empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    padding: 24px; color: var(--txt-dim);
  }
  .empty.hidden { display: none; }
  .empty .drop {
    border: 1.5px dashed var(--line); border-radius: 16px; padding: 28px 22px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    max-width: 320px; background: rgba(255,255,255,.015);
  }
  .empty.drag { color: var(--accent); }
  .empty.drag .drop { border-color: var(--accent); background: rgba(74,158,255,.06); }
  .btn-primary {
    background: var(--accent); color: var(--accent-ink); border: none;
    font-weight: 700; font-size: 14px; padding: 11px 18px; border-radius: 12px; cursor: pointer;
  }
  .btn-primary:active { filter: brightness(.94); }
  .hint { font-size: 12px; line-height: 1.5; }

  /* busy spinner */
  .busy { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.35); z-index:5; }
  .busy.show { display:flex; }
  .spinner { width:34px; height:34px; border-radius:50%;
    border:3px solid rgba(255,255,255,.25); border-top-color: var(--accent);
    animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== control dock (standard bottom sheet: filmstrip + handle + controls) ===== */
  .dock {
    flex: 0 0 auto; z-index: 4;
    display: flex; flex-direction: column;
    background: var(--glass);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    backdrop-filter: blur(22px) saturate(1.4);
    border-top: 1px solid var(--hair);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -8px 26px rgba(0,0,0,.34);
  }
  .dock.hidden { display: none; }

  /* ===== filmstrip ===== */
  .filmstrip {
    flex: 0 0 auto; display: flex; gap: 9px; padding: 11px 12px 7px; overflow-x: auto;
    scrollbar-width: none;
  }
  .filmstrip::-webkit-scrollbar { display: none; }
  .filmstrip.hidden { display: none; }
  .thumb {
    position: relative; flex: 0 0 auto; width: 50px; height: 50px; border-radius: 11px;
    overflow: hidden; border: 2px solid transparent; background: #0b0d10; cursor: pointer;
    transition: transform .12s ease;
  }
  .thumb.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .x {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,.66); color: #fff; font-size: 12px; line-height: 18px; text-align: center;
    backdrop-filter: blur(4px);
  }
  .thumb.add {
    display: flex; align-items: center; justify-content: center; border: 1.5px dashed var(--line);
    color: var(--txt-dim); font-size: 22px; background: rgba(255,255,255,.03);
  }
  .crop-badge {
    position: absolute; left: 2px; bottom: 2px; width: 17px; height: 17px; border-radius: 6px;
    background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .crop-badge svg { width: 11px; height: 11px; }

  /* ===== collapsible sheet handle (large tap target) ===== */
  .sheet-handle {
    flex: 0 0 auto; position: relative;
    display: flex; align-items: center; justify-content: center;
    height: 30px; cursor: pointer; color: var(--txt-dim); user-select: none;
  }
  .sheet-handle.hidden { display: none; }
  .sheet-handle .grip {
    width: 52px; height: 5px; border-radius: 3px; background: rgba(255,255,255,.28);
    transition: background .12s ease, width .12s ease;
  }
  .sheet-handle:active .grip { background: rgba(255,255,255,.5); width: 60px; }
  /* chevron hint to the right of the grip; points down (collapse) / up (expand) */
  .sheet-handle::after {
    content: ""; position: absolute; right: 18px; top: 50%;
    width: 9px; height: 9px; border-right: 2px solid var(--txt-dim); border-bottom: 2px solid var(--txt-dim);
    transform: translateY(-65%) rotate(45deg); transition: transform .18s ease; opacity: .8;
  }
  body.sheets-collapsed .sheet-handle::after { transform: translateY(-35%) rotate(-135deg); }
  .dock-body {
    overflow: hidden; max-height: 56vh; opacity: 1;
    transition: max-height .26s cubic-bezier(.4,0,.2,1), opacity .18s ease;
  }
  body.sheets-collapsed .dock-body { max-height: 0; opacity: 0; }

  /* ===== control sheet (per-mode) ===== */
  .sheet {
    flex: 0 1 auto; max-height: 38vh; overflow-y: auto;
    padding: 4px 16px calc(14px + var(--safe-b));
    -webkit-overflow-scrolling: touch;
  }
  .sheet.hidden { display: none; }
  .row { margin: 13px 0; }
  .row > .lab {
    font-size: 10.5px; color: var(--txt-dim); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
    text-transform: uppercase; letter-spacing: .07em; font-weight: 600;
  }
  .row > .lab > span:nth-child(2) { font-variant-numeric: tabular-nums; letter-spacing: 0; text-transform: none; color: var(--txt); font-weight: 600; }
  .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--txt);
    font-size: 13px; font-weight: 550; padding: 8px 13px; border-radius: 11px; cursor: pointer; white-space: nowrap;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .chip:active { transform: scale(.97); }
  .chip[aria-pressed="true"] { border-color: transparent; color: #fff; background: var(--accent); box-shadow: 0 2px 10px var(--accent-soft); }
  .chip.ghost[aria-pressed="true"] { background: var(--accent-soft); color: var(--accent); box-shadow: none; }

  /* ===== range slider ===== */
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 28px; background: transparent; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 5px; border-radius: 3px;
    background: linear-gradient(var(--accent), var(--accent)) 0/var(--fill,50%) 100% no-repeat, rgba(255,255,255,.12);
  }
  input[type="range"]::-moz-range-track { height: 5px; border-radius: 3px; background: rgba(255,255,255,.12); }
  input[type="range"]::-moz-range-progress { height: 5px; border-radius: 3px; background: var(--accent); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 20px; height: 20px; margin-top: -7.5px;
    border-radius: 50%; background: #fff; border: 1px solid rgba(0,0,0,.2);
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border: none; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .swatches { display: flex; gap: 9px; align-items: center; }
  .sw {
    width: 32px; height: 32px; border-radius: 9px; border: 2px solid var(--line); cursor: pointer; padding: 0;
    transition: box-shadow .12s ease;
  }
  .sw[aria-pressed="true"] { border-color: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }
  .sw.custom { position: relative; overflow: hidden; background: conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); }
  .sw.custom input { position: absolute; inset: -6px; opacity: 0; cursor: pointer; }
  .seg {
    display: inline-flex; padding: 3px; gap: 3px; background: rgba(255,255,255,.05);
    border: 1px solid var(--line); border-radius: 12px;
  }
  .seg button {
    background: transparent; color: var(--txt-dim); border: none; font-size: 13px; font-weight: 600;
    padding: 7px 14px; cursor: pointer; border-radius: 9px; transition: background .14s ease, color .14s ease;
  }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-soft); }
  .export-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  .export-row .btn-primary { flex: 1; padding: 14px; font-size: 15px; }
  .note { font-size: 11px; color: var(--txt-dim); line-height: 1.5; margin-top: 9px; }
  .note.warn { color: #E0B055; }

  /* small icon toggle (e.g. crop orientation) */
  .icon-toggle {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--txt);
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 11px; cursor: pointer;
  }
  .icon-toggle:active { transform: scale(.97); }
  .icon-toggle:disabled { opacity: .35; }
  .icon-toggle svg { width: 16px; height: 16px; }

  /* ===== bottom mode toolbar ===== */
  .toolbar {
    flex: 0 0 auto; height: calc(var(--toolbar-h) + var(--safe-b));
    padding-bottom: var(--safe-b);
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: var(--ink); border-top: 1px solid var(--line);
  }
  .mode {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    color: var(--txt-dim); background: none; border: none; cursor: pointer; font-size: 11px; font-weight: 550;
    transition: color .12s ease;
  }
  .mode svg { width: 23px; height: 23px; }
  .mode[aria-selected="true"] { color: var(--accent); }
  .mode:disabled { opacity: .4; }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="title" id="appTitle">Studio Foto</span>
    <span class="spacer"></span>
    <button class="icon-btn" id="btnUndo" disabled aria-label="Urungkan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v1a5 5 0 0 1-5 5H7"/></svg>
    </button>
    <button class="icon-btn" id="btnInstall" style="display:none" aria-label="Pasang aplikasi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"/></svg>
    </button>
    <button class="icon-btn" id="btnAddTop" aria-label="Tambah foto">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div class="stage-wrap">
  <div class="workspace" id="workspace">
    <canvas id="stage"></canvas>

    <div class="empty" id="empty">
      <div class="drop" id="dropzone">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
        <div class="hint" id="emptyHint">Belum ada foto.<br>Impor JPEG hasil ekspor Lightroom.</div>
        <button class="btn-primary" id="btnImport">Impor Foto</button>
        <div class="hint" id="dropHint" style="opacity:.7">atau seret &amp; lepas ke sini</div>
      </div>
    </div>

    <div class="busy" id="busy"><div class="spinner"></div></div>
  </div>

  <div class="dock hidden" id="dock">
  <div class="sheet-handle hidden" id="sheetHandle">
    <span class="grip"></span>
  </div>
  <div class="dock-body" id="dockBody">
  <div class="filmstrip hidden" id="filmstrip"></div>

  <div class="sheet hidden" id="sheetFrame">
    <div class="row">
      <div class="lab"><span id="labRatio">Rasio</span></div>
      <div class="chips" id="ratioChips">
        <button class="chip" data-ratio="1:1">1:1</button>
        <button class="chip" data-ratio="4:5" aria-pressed="true">4:5</button>
        <button class="chip" data-ratio="3:4">3:4</button>
        <button class="chip" data-ratio="9:16">9:16</button>
        <button class="chip" data-ratio="16:9">16:9</button>
        <button class="chip" data-ratio="3:2">3:2</button>
        <button class="chip" data-ratio="original" id="chipOriginal">Asli</button>
      </div>
    </div>

    <div class="row" id="frameOrientRow" style="display:none">
      <button class="icon-toggle" id="btnFrameOrient" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a9 9 0 0 0-15-3L3 8"/><path d="M3 3v5h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3"/><path d="M21 21v-5h-5"/></svg>
        <span id="frameOrientLabel">Potret</span>
      </button>
    </div>

    <div class="row">
      <div class="lab"><span id="labMargin">Margin</span><span id="marginVal">4%</span></div>
      <input type="range" id="marginRange" min="0" max="25" step="1" value="4" />
    </div>

    <div class="row">
      <div class="lab"><span id="labBg">Latar belakang</span></div>
      <div class="seg" id="bgSeg">
        <button data-bg="solid" aria-pressed="true" id="bgSolid">Warna</button>
        <button data-bg="blur" id="bgBlur">Blur</button>
      </div>
    </div>

    <div class="row" id="blurRow" style="display:none">
      <div class="lab"><span id="labBlur">Kekuatan blur</span><span id="blurVal">5%</span></div>
      <input type="range" id="blurRange" min="2" max="14" step="1" value="5" />
    </div>

    <div class="row" id="frameColorRow">
      <div class="lab"><span id="labFrameColor">Warna bingkai</span></div>
      <div class="swatches" id="frameSwatches">
        <button class="sw" data-color="#FFFFFF" style="background:#fff" aria-pressed="true"></button>
        <button class="sw" data-color="#000000" style="background:#000"></button>
        <button class="sw" data-color="#F2EDE4" style="background:#F2EDE4"></button>
        <button class="sw custom" id="customSw"><input type="color" id="customColor" value="#cccccc" /></button>
      </div>
    </div>

    <div class="row">
      <div class="lab"><span id="labExportSize">Ukuran ekspor</span></div>
      <div class="seg" id="sizeSeg">
        <button data-ig="1" aria-pressed="true" id="sizeIG">Instagram 1080</button>
        <button data-ig="0" id="sizeHi">Resolusi tinggi</button>
      </div>
    </div>

    <div class="row" id="qualityRow">
      <div class="lab"><span id="labQuality">Kualitas JPEG</span><span id="qualityVal">92</span></div>
      <input type="range" id="qualityRange" min="70" max="95" step="1" value="92" />
    </div>

    <div class="row">
      <div class="lab"><span id="labFormat">Format</span></div>
      <div class="seg" id="formatSeg">
        <button data-fmt="jpeg" aria-pressed="true" id="fmtJpeg">JPEG (foto)</button>
        <button data-fmt="png" id="fmtPng">PNG (desain)</button>
      </div>
    </div>

    <div class="export-row">
      <button class="btn-primary" id="btnExport">Ekspor</button>
      <button class="chip ghost" id="btnSave" style="padding:13px 16px">Simpan</button>
      <button class="chip ghost" id="btnExportAll" style="display:none; padding:13px 16px">Semua</button>
    </div>
    <div class="note" id="exportNote"></div>

    <div class="row" id="presetsRow" style="margin-top:14px">
      <div class="lab"><span id="labPresets">Preset</span><button class="chip" id="btnSavePreset" style="padding:5px 11px">+ Simpan</button></div>
      <div class="chips" id="presetChips"></div>
    </div>
  </div>

  <div class="sheet hidden" id="sheetCrop">
    <div class="row">
      <div class="lab"><span id="labCropRatio">Rasio</span><span id="cropHint" style="opacity:.7"></span></div>
      <div class="chips" id="cropRatioChips">
        <button class="chip" data-ratio="1:1">1:1</button>
        <button class="chip" data-ratio="4:5" aria-pressed="true">4:5</button>
        <button class="chip" data-ratio="3:4">3:4</button>
        <button class="chip" data-ratio="9:16">9:16</button>
        <button class="chip" data-ratio="16:9">16:9</button>
        <button class="chip" data-ratio="3:2">3:2</button>
        <button class="chip" data-ratio="original" id="cropChipOriginal">Asli</button>
      </div>
    </div>
    <div class="row" id="cropToolsRow" style="display:flex; gap:9px; flex-wrap:wrap">
      <button class="icon-toggle" id="btnCropRotate" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9a9 9 0 0 1 15-3l3 3"/><path d="M21 3v6h-6"/></svg>
        <span>Putar 90°</span>
      </button>
      <button class="icon-toggle" id="btnCropOrient" type="button" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a9 9 0 0 0-15-3L3 8"/><path d="M3 3v5h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3"/><path d="M21 21v-5h-5"/></svg>
        <span id="cropOrientLabel">Potret</span>
      </button>
    </div>
    <div class="export-row">
      <button class="chip ghost" id="btnCropReset" style="padding:13px 16px">Atur ulang</button>
      <button class="btn-primary" id="btnCropExport">Ekspor</button>
      <button class="chip ghost" id="btnCropSave" style="padding:13px 16px">Simpan</button>
    </div>
    <div class="note" id="cropExportNote"></div>
  </div>

  <div class="sheet hidden" id="sheetCollage">
    <div class="row">
      <div class="lab"><span id="labGrid">Kisi</span></div>
      <div class="chips" id="gridChips">
        <button class="chip" data-rows="1" data-cols="2">1×2</button>
        <button class="chip" data-rows="2" data-cols="1">2×1</button>
        <button class="chip" data-rows="2" data-cols="2" aria-pressed="true">2×2</button>
        <button class="chip" data-rows="1" data-cols="3">1×3</button>
        <button class="chip" data-rows="3" data-cols="1">3×1</button>
        <button class="chip" data-rows="2" data-cols="3">2×3</button>
        <button class="chip" data-rows="3" data-cols="2">3×2</button>
      </div>
    </div>
    <div class="row">
      <div class="lab"><span id="labTemplate">Tata letak</span></div>
      <div class="chips" id="templateChips"></div>
    </div>
    <div class="row">
      <div class="lab"><span id="labColRatio">Rasio</span></div>
      <div class="chips" id="collageRatioChips">
        <button class="chip" data-ratio="1:1" aria-pressed="true">1:1</button>
        <button class="chip" data-ratio="4:5">4:5</button>
        <button class="chip" data-ratio="3:4">3:4</button>
        <button class="chip" data-ratio="16:9">16:9</button>
      </div>
    </div>
    <div class="row">
      <div class="lab"><span id="labGutter">Jarak</span><span id="gutterVal">2%</span></div>

<script>

/* ===========================================================================

const STRINGS = {

/* ===========================================================================
 * geometryCore — INLINED VERBATIM from the P1-tested module.
 * Function bodies are byte-identical to geometryCore.js (Node-verified).
 * Only the export mechanism differs (object literal vs module.exports).
 * DO NOT edit math here without re-running geometryCore.test.js.
 * ======================================================================== */
const geometryCore = (function () {
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  function splitInteger(total, n) {
    if (!Number.isInteger(total)) throw new RangeError('splitInteger: total must be integer');
    if (n <= 0) throw new RangeError('splitInteger: n must be > 0');
    const base = Math.floor(total / n);
    const rem = total - base * n;
    const parts = new Array(n);
    for (let i = 0; i < n; i++) parts[i] = base + (i < rem ? 1 : 0);
    return parts;
  }

  const RATIO_PRESETS = {
    '1:1': [1, 1], '4:5': [4, 5], '3:4': [3, 4],
    '9:16': [9, 16], '16:9': [16, 9], '3:2': [3, 2],
  };

  function parseRatio(preset, sourceW, sourceH) {
    if (preset === 'original') {
      if (!(sourceW > 0 && sourceH > 0)) throw new RangeError('parseRatio: "original" needs positive source dims');
      return { w: sourceW, h: sourceH };
    }
    const p = RATIO_PRESETS[preset];
    if (!p) throw new RangeError('parseRatio: unknown preset "' + preset + '"');
    return { w: p[0], h: p[1] };
  }

  function canvasDimsForRatio(ratioW, ratioH, exportShortEdge) {
    if (ratioW <= 0 || ratioH <= 0) throw new RangeError('canvasDimsForRatio: bad ratio');
    if (exportShortEdge <= 0) throw new RangeError('canvasDimsForRatio: bad short edge');
    let Cw, Ch;
    if (ratioW <= ratioH) { Cw = exportShortEdge; Ch = Math.round(exportShortEdge * (ratioH / ratioW)); }
    else { Ch = exportShortEdge; Cw = Math.round(exportShortEdge * (ratioW / ratioH)); }
    return { Cw, Ch };
  }

  function computeContainRect(sw, sh, dw, dh) {
    const scale = Math.min(dw / sw, dh / sh);
    const w = sw * scale, h = sh * scale;
    return { x: (dw - w) / 2, y: (dh - h) / 2, w, h, scale };
  }
  function computeCoverRect(sw, sh, dw, dh) {
    const scale = Math.max(dw / sw, dh / sh);
    const w = sw * scale, h = sh * scale;
    return { x: (dw - w) / 2, y: (dh - h) / 2, w, h, scale };
  }
  function computeFillRect(sw, sh, dw, dh, mode) {
    return mode === 'cover' ? computeCoverRect(sw, sh, dw, dh) : computeContainRect(sw, sh, dw, dh);
  }

  function computeFrameLayout({ sw, sh, Cw, Ch, marginPct }) {
    if (sw <= 0 || sh <= 0 || Cw <= 0 || Ch <= 0) throw new RangeError('computeFrameLayout: dims must be > 0');
    if (marginPct < 0 || marginPct > 25) throw new RangeError('computeFrameLayout: marginPct out of [0,25]');
    const marginPx = (marginPct / 100) * Math.min(Cw, Ch);
    const inner = { x: marginPx, y: marginPx, w: Cw - 2 * marginPx, h: Ch - 2 * marginPx };
    const fit = computeContainRect(sw, sh, inner.w, inner.h);
    const draw = { x: inner.x + fit.x, y: inner.y + fit.y, w: fit.w, h: fit.h, scale: fit.scale };
    const frame = { top: draw.y, bottom: Ch - (draw.y + draw.h), left: draw.x, right: Cw - (draw.x + draw.w) };
    return { marginPx, inner, draw, frame };
  }

  function maxAspectBox(sw, sh, rw, rh) {
    const r = rw / rh;
    if (sw / sh > r) return { w: sh * r, h: sh };
    return { w: sw, h: sw / r };
  }
  function clampCropBox(box, sw, sh) {
    const w = clamp(box.w, 1, sw), h = clamp(box.h, 1, sh);
    const x = clamp(box.x, 0, sw - w), y = clamp(box.y, 0, sh - h);
    return { x, y, w, h };
  }
  function computeCropBoxLocked({ sourceW, sourceH, ratioW, ratioH, zoom, centerX, centerY }) {
    if (sourceW <= 0 || sourceH <= 0) throw new RangeError('crop: source dims > 0');
    const max = maxAspectBox(sourceW, sourceH, ratioW, ratioH);
    const z = Math.max(1, zoom);
    const w = max.w / z, h = max.h / z;
    const cx = clamp(centerX, w / 2, sourceW - w / 2);
    const cy = clamp(centerY, h / 2, sourceH - h / 2);
    return { x: cx - w / 2, y: cy - h / 2, w, h };
  }
  function cropZoomAboutPoint({ sourceW, sourceH, ratioW, ratioH, zoom, centerX, centerY, factor, fx, fy, maxZoom = 64 }) {
    const max = maxAspectBox(sourceW, sourceH, ratioW, ratioH);
    const oldZ = Math.max(1, zoom);
    const oldW = max.w / oldZ, oldH = max.h / oldZ;
    const oldX = clamp(centerX, oldW / 2, sourceW - oldW / 2) - oldW / 2;
    const oldY = clamp(centerY, oldH / 2, sourceH - oldH / 2) - oldH / 2;
    const srcX = oldX + fx * oldW, srcY = oldY + fy * oldH;
    const newZ = clamp(oldZ * factor, 1, maxZoom);
    const newW = max.w / newZ, newH = max.h / newZ;
    let ncx = srcX + newW * (0.5 - fx), ncy = srcY + newH * (0.5 - fy);
    ncx = clamp(ncx, newW / 2, sourceW - newW / 2);
    ncy = clamp(ncy, newH / 2, sourceH - newH / 2);
    return { zoom: newZ, centerX: ncx, centerY: ncy };
  }

  function computeCarouselComposite({ Hc, N, tileRatioW, tileRatioH }) {
    if (Hc <= 0) throw new RangeError('carousel: Hc must be > 0');
    if (!(Number.isInteger(N) && N >= 2 && N <= 10)) throw new RangeError('carousel: N must be an integer in 2..10');
    const tileWNominal = Hc * (tileRatioW / tileRatioH);
    const Wc = Math.round(N * tileWNominal);
    if (Wc < N) throw new RangeError('carousel: Wc < N (degenerate composite)');
    return { Wc, Hc, tileWNominal };
  }
  function computeCarouselBoundaries(Wc, N) {
    if (!(Number.isInteger(Wc) && Wc >= N)) throw new RangeError('carousel: need integer Wc >= N');
    const b = new Array(N + 1);
    for (let k = 0; k <= N; k++) b[k] = Math.round((k * Wc) / N);
    return b;
  }
  function carouselTiles(Wc, Hc, N) {
    const b = computeCarouselBoundaries(Wc, N);
    const tiles = new Array(N);
    for (let k = 0; k < N; k++) tiles[k] = { index: k, x: b[k], y: 0, w: b[k + 1] - b[k], h: Hc };
    return tiles;
  }
  function carouselFilenames(N, prefix = 'seamless', ext = 'jpg') {
    const out = new Array(N);
    for (let k = 1; k <= N; k++) out[k - 1] = `${prefix}_${String(k).padStart(2, '0')}.${ext}`;
    return out;
  }

  function computeCollageLayout({ Cw, Ch, rows, cols, outerMargin = 0, gutter = 0 }) {
    if (!(Number.isInteger(rows) && rows > 0)) throw new RangeError('collage: rows > 0 int');
    if (!(Number.isInteger(cols) && cols > 0)) throw new RangeError('collage: cols > 0 int');
    const M = outerMargin, G = gutter;
    const aw = Cw - 2 * M, ah = Ch - 2 * M;
    const colTotal = aw - (cols - 1) * G, rowTotal = ah - (rows - 1) * G;
    if (colTotal < cols || rowTotal < rows) throw new RangeError('collage: not enough space for cells (>=1px each)');
    const colW = splitInteger(colTotal, cols), rowH = splitInteger(rowTotal, rows);
    const lefts = new Array(cols); let x = M;
    for (let c = 0; c < cols; c++) { lefts[c] = x; x += colW[c] + G; }
    const tops = new Array(rows); let y = M;
    for (let r = 0; r < rows; r++) { tops[r] = y; y += rowH[r] + G; }
    const cells = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) cells.push({ r, c, x: lefts[c], y: tops[r], w: colW[c], h: rowH[r] });
    return { cells, colW, rowH, outerMargin: M, gutter: G };
  }

  function rotatedDims(w, h, deg) {
    const d = ((deg % 360) + 360) % 360;
    return (d === 90 || d === 270) ? { w: h, h: w } : { w, h };
  }

  function templateRects({ Cw, Ch, cells, outerMargin = 0, gutter = 0 }) {
    if (!Array.isArray(cells) || !cells.length) throw new RangeError('template: cells required');
    const M = outerMargin, half = gutter / 2, eps = 1e-4;
    const aw = Cw - 2 * M, ah = Ch - 2 * M;
    if (aw < cells.length || ah < 1) throw new RangeError('template: area too small');
    return cells.map((c) => {
      const hasL = c.x > eps, hasT = c.y > eps;
      const hasR = c.x + c.w < 1 - eps, hasB = c.y + c.h < 1 - eps;
      const x0 = M + c.x * aw + (hasL ? half : 0);
      const y0 = M + c.y * ah + (hasT ? half : 0);
      const x1 = M + (c.x + c.w) * aw - (hasR ? half : 0);
      const y1 = M + (c.y + c.h) * ah - (hasB ? half : 0);
      const x = Math.round(x0), y = Math.round(y0);
      return { x, y, w: Math.max(1, Math.round(x1) - x), h: Math.max(1, Math.round(y1) - y) };
    });
  }

  return {
    clamp, splitInteger, RATIO_PRESETS, parseRatio, canvasDimsForRatio,
    computeContainRect, computeCoverRect, computeFillRect, computeFrameLayout,
    maxAspectBox, clampCropBox, computeCropBoxLocked, cropZoomAboutPoint,
    computeCarouselComposite, computeCarouselBoundaries, carouselTiles, carouselFilenames,
    computeCollageLayout, templateRects, rotatedDims,
  };
})();

/* ===========================================================================
 * Config
 * ======================================================================== */
const CONFIG = {
  WORK_MAX: 2048,     // long-edge cap for the working (preview) bitmap
  EXPORT_MAX: 2160,   // short-edge cap for high-res (non-IG) export
  IG_WIDTH: 1080,     // Instagram feed render width — pin to this for zero IG resize
  DPR_CAP: 2.5,       // limit devicePixelRatio to bound stage canvas memory
};

/* ===========================================================================
 * State — one full-res ImageBitmap per source, at most one working bitmap shown.
 * ======================================================================== */
const state = {
  sources: [],        // { id, name, bitmap(full-res), w, h, thumbUrl }
  activeId: null,
  mode: "frame",
  work: null,         // { id, bitmap(downscaled), w, h } — current preview bitmap
  frame: {
    ratio: "4:5",
    flip: false,        // landscape orientation for the chosen ratio
    marginPct: 4,
    frameColor: "#FFFFFF",
    bg: "solid",        // 'solid' | 'blur'
    blurStrength: 0.05, // fraction of min(Cw,Ch) used as blur radius
  },
  exportOpt: {
    ig: true,           // pin width to IG 1080
    quality: 0.92,      // JPEG quality
    format: "jpeg",     // 'jpeg' | 'png'
  },
  collage: {
    rows: 2, cols: 2,
    template: null,      // null = uniform rows×cols grid; else a template id
    ratio: "1:1",        // output canvas ratio
    gutterPct: 2,        // % of min(canvas edge)
    marginPct: 0,        // outer margin, % of min(canvas edge)
    gutterColor: "#FFFFFF",
    cells: [],           // [{ srcId, zoom, cx, cy }] length rows*cols
    selected: 0,
  },
  carousel: {
    n: 3,                // number of tiles (2..10)
    tileRatio: "4:5",    // each posted tile's aspect
    fill: "cover",       // 'cover' | 'fit'
    adjust: "move",      // 'move' = drag repositions image (both axes); 'browse' = drag scrolls tiles
    pos: 0,              // preview scroll position in tile units
    zoom: 1,             // image zoom within the composite (cover only)
    cx: 0.5, cy: 0.5,    // image position within the composite (source fractions)
  },
};
let _idSeq = 0;
const nextId = () => "src_" + (++_idSeq);
const bumpIdSeq = (n) => { if (Number.isFinite(n) && n > _idSeq) _idSeq = n; };

/* ===========================================================================
 * importer — decode with EXIF orientation baked in, build two-res assets.
 * ======================================================================== */
const importer = (function () {

  // Decode a File/Blob into an orientation-corrected ImageBitmap.
  // `imageOrientation:'from-image'` makes the decoder apply the EXIF transform,
  // so intrinsic w/h are the *visual* dimensions — no manual EXIF parsing.
  async function decodeOriented(blob) {
    try {
      return await createImageBitmap(blob, { imageOrientation: "from-image" });
    } catch (e) {
      // Fallback path: some engines reject the options bag. Decode raw, then
      // the rotation may be wrong — acceptable degraded mode, flagged to user.
      return await createImageBitmap(blob);
    }
  }

  // Downscale a full-res bitmap to <= WORK_MAX on its long edge for the preview
  // pipeline. Returns a NEW ImageBitmap; caller owns its lifecycle.
  async function makeWorkingBitmap(srcBitmap, w, h) {
    const long = Math.max(w, h);
    if (long <= CONFIG.WORK_MAX) {
      // Already small enough — clone so working/source lifecycles stay separate.
      return await createImageBitmap(srcBitmap);
    }
    const scale = CONFIG.WORK_MAX / long;
    const dw = Math.max(1, Math.round(w * scale));
    const dh = Math.max(1, Math.round(h * scale));
    const off = new OffscreenCanvas(dw, dh);
    const ctx = off.getContext("2d");
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(srcBitmap, 0, 0, dw, dh);
    return await createImageBitmap(off);
  }

  // Small JPEG thumbnail (object URL) for the filmstrip. Cheap, cover-cropped.
  async function makeThumbUrl(srcBitmap, w, h, size = 104) {
    const fit = geometryCore.computeCoverRect(w, h, size, size);
    const off = new OffscreenCanvas(size, size);
    const ctx = off.getContext("2d");
    ctx.drawImage(srcBitmap, fit.x, fit.y, fit.w, fit.h);
    const blob = await off.convertToBlob({ type: "image/jpeg", quality: 0.7 });
    return URL.createObjectURL(blob);
  }

  // Import a list of File objects → push sources, return how many succeeded.
  async function importFiles(fileList) {
    const files = Array.from(fileList).filter((f) => /^image\//.test(f.type));
    if (!files.length) { ui.toast(STRINGS.errNoImages); return 0; }
    ui.setBusy(true);
    let ok = 0;
    try {
      for (const f of files) {
        try {
          const bitmap = await decodeOriented(f);
          const w = bitmap.width, h = bitmap.height; // already orientation-corrected
          const thumbUrl = await makeThumbUrl(bitmap, w, h);
          const id = nextId();
          state.sources.push({ id, name: f.name || (id + ".jpg"), bitmap, w, h, thumbUrl, blob: f, crop: null, croppedBitmap: null, cropDims: null });
          sessionStore.putSource({ id, name: f.name || (id + ".jpg"), blob: f });
          if (!state.activeId) state.activeId = id;
          ok++;
        } catch (e) {
          console.error("decode failed", f && f.name, e);
          ui.toast(STRINGS.errDecode + (f && f.name ? f.name : ""));
        }
      }
    } finally {
      ui.setBusy(false);
    }
    if (ok) { await renderer.useActive(); ui.refreshFilmstrip(); ui.refreshEmpty(); ui.updateExportNote(); if (state.mode === "collage") { collageMode.assignSources(); renderer.draw(); } sessionStore.scheduleMeta(); }
    return ok;
  }

  // Release everything tied to a source (GPU bitmap + object URL).
  function disposeSource(src) {
    try { src.bitmap && src.bitmap.close && src.bitmap.close(); } catch (_) {}
    try { src.croppedBitmap && src.croppedBitmap.close && src.croppedBitmap.close(); } catch (_) {}
    try { src.thumbUrl && URL.revokeObjectURL(src.thumbUrl); } catch (_) {}
  }

  // Recreate a source from a persisted record (keeps its original id + crop).
  async function restoreSource(rec, crop) {
    const bitmap = await decodeOriented(rec.blob);
    const w = bitmap.width, h = bitmap.height;
    const thumbUrl = await makeThumbUrl(bitmap, w, h);
    state.sources.push({
      id: rec.id, name: rec.name || (rec.id + ".jpg"), bitmap, w, h, thumbUrl,
      blob: rec.blob, crop: crop || null, croppedBitmap: null, cropDims: null,
    });
    const n = parseInt(String(rec.id).replace(/^src_/, ""), 10);
    bumpIdSeq(n);
  }

  // Rotate the working bitmap to an absolute 90° step (0/90/180/270), keeping
  // the original around so rotation stays lossless and reversible. All modes
  // read src.bitmap/src.w/src.h, so they pick up the new orientation for free.
  async function applyRotation(src, deg) {
    if (!src) return;
    const d = (((deg | 0) % 360) + 360) % 360;
    if (!src.origBitmap) { src.origBitmap = src.bitmap; src.origW = src.w; src.origH = src.h; }
    const closeCur = () => { if (src.bitmap && src.bitmap !== src.origBitmap) { try { src.bitmap.close(); } catch (_) {} } };
    if (d === 0) {
      closeCur();
      src.bitmap = src.origBitmap; src.w = src.origW; src.h = src.origH;
    } else {
      const dims = geometryCore.rotatedDims(src.origW, src.origH, d);
      const cv = document.createElement("canvas");
      cv.width = dims.w; cv.height = dims.h;
      const ctx = cv.getContext("2d");
      ctx.imageSmoothingQuality = "high";
      ctx.translate(dims.w / 2, dims.h / 2);
      ctx.rotate((d * Math.PI) / 180);
      ctx.drawImage(src.origBitmap, -src.origW / 2, -src.origH / 2, src.origW, src.origH);
      const rb = await createImageBitmap(cv);
      closeCur();
      src.bitmap = rb; src.w = dims.w; src.h = dims.h;
    }
    try { if (src.thumbUrl) URL.revokeObjectURL(src.thumbUrl); } catch (_) {}
    src.thumbUrl = await makeThumbUrl(src.bitmap, src.w, src.h);
  }

  return { importFiles, makeWorkingBitmap, disposeSource, restoreSource, applyRotation };
})();

/* ===========================================================================
 * compositor — resolution-agnostic frame composition. Draws into ANY ctx in a
 * 0..Cw × 0..Ch coordinate space, using ANY bitmap (working OR full-res). The
 * exact same path renders the live preview and the full-res export, so WYSIWYG
 * is structural, not approximated. Layout comes from the P1-tested geometryCore.
 * ======================================================================== */
const compositor = (function () {
  // Cover-draw a bitmap over Cw×Ch, centered, with optional overscan (>1).
  function coverDraw(ctx, bmp, bw, bh, Cw, Ch, overscan) {
    const s = Math.max(Cw / bw, Ch / bh) * (overscan || 1);
    const dw = bw * s, dh = bh * s;
    ctx.drawImage(bmp, (Cw - dw) / 2, (Ch - dh) / 2, dw, dh);
  }

  // Returns the geometryCore layout it used (so callers/tests can verify).
  function composeFrame(ctx, bmp, bw, bh, Cw, Ch, f) {
    if (f.bg === "blur") {
      const r = Math.max(1, Math.round(Math.min(Cw, Ch) * (f.blurStrength || 0.05)));
      ctx.save();
      ctx.filter = "blur(" + r + "px)";
      coverDraw(ctx, bmp, bw, bh, Cw, Ch, 1.12); // overscan hides blur bleed at edges
      ctx.restore();
    } else {
      ctx.fillStyle = f.frameColor;
      ctx.fillRect(0, 0, Cw, Ch);
    }
    const L = geometryCore.computeFrameLayout({ sw: bw, sh: bh, Cw, Ch, marginPct: f.marginPct });
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(bmp, L.draw.x, L.draw.y, L.draw.w, L.draw.h);
    return L;
  }

  // Target canvas pixel dims for a ratio under the current export profile.
  function exportDims(ratioW, ratioH, ig) {
    if (ig) {
      const Cw = CONFIG.IG_WIDTH;
      const Ch = Math.round(Cw * (ratioH / ratioW));
      return { Cw, Ch };
    }
    return geometryCore.canvasDimsForRatio(ratioW, ratioH, CONFIG.EXPORT_MAX);
  }

  // Frame output ratio, honoring the orientation flip for non-square ratios.
  function frameRatio(f, w, h) {
    const r = geometryCore.parseRatio(f.ratio, w, h);
    if (f.flip && f.ratio !== "original" && r.w !== r.h) return { w: r.h, h: r.w };
    return r;
  }

  return { composeFrame, coverDraw, exportDims, frameRatio };
})();


/* ===========================================================================
 * renderer — two-resolution preview. Draws the active image on the
 * gray stage at working resolution. Frame composition is delegated to the
 * compositor; later phases add crop/collage/carousel rendering.
 * ======================================================================== */
const renderer = (function () {
  const stage = document.getElementById("stage");
  const ctx = stage.getContext("2d");

  function activeSource() {
    return state.sources.find((s) => s.id === state.activeId) || null;
  }

  // The drawable a mode should use: the CROPPED image when a non-identity crop
  // exists, otherwise the full original. This is what makes crop a global,
  // non-destructive upstream transform (crop → frame/collage/carousel).
  function effective(src) {
    if (src && src.crop && src.croppedBitmap) {
      return { bitmap: src.croppedBitmap, w: src.cropDims.w, h: src.cropDims.h };
    }
    return { bitmap: src.bitmap, w: src.w, h: src.h };
  }

  // A crop that doesn't actually change anything (whole image).
  function isIdentityCrop(crop) {
    return !crop || (crop.ratio === "original" && Math.abs((crop.zoom || 1) - 1) < 1e-3);
  }

  // Bake the active/given source's crop into a cached cropped bitmap (GPU-side,
  // via createImageBitmap with a sub-rect). Closes the previous one.
  async function bakeCrop(src) {
    if (!src) return;
    if (isIdentityCrop(src.crop)) {
      if (src.croppedBitmap) { try { src.croppedBitmap.close(); } catch (_) {} }
      src.croppedBitmap = null; src.cropDims = null;
      return;
    }
    const r = geometryCore.parseRatio(src.crop.ratio, src.w, src.h);
    // honor the per-image orientation flip (landscape) for non-square ratios
    let rw = r.w, rh = r.h;
    if (src.crop.flip && src.crop.ratio !== "original" && r.w !== r.h) { rw = r.h; rh = r.w; }
    const box = geometryCore.computeCropBoxLocked({
      sourceW: src.w, sourceH: src.h, ratioW: rw, ratioH: rh,
      zoom: src.crop.zoom, centerX: src.crop.cx * src.w, centerY: src.crop.cy * src.h,
    });
    const sx = Math.max(0, Math.round(box.x)), sy = Math.max(0, Math.round(box.y));
    const sw = Math.min(src.w - sx, Math.round(box.w)), sh = Math.min(src.h - sy, Math.round(box.h));
    const prev = src.croppedBitmap;
    src.croppedBitmap = await createImageBitmap(src.bitmap, sx, sy, Math.max(1, sw), Math.max(1, sh));
    src.cropDims = { w: src.croppedBitmap.width, h: src.croppedBitmap.height };
    if (prev) { try { prev.close(); } catch (_) {} }
  }
  async function bakeCropActive() { await bakeCrop(activeSource()); }

  // Mark the active source and redraw. Previews now render from the full-res
  // bitmap directly (sharper), so no downscaled working bitmap is needed.
  async function useActive() {
    const src = activeSource();
    if (!src) { clear(); return; }
    state.work = { id: src.id };
    draw();
  }

  function clear() {
    const ws = document.getElementById("workspace");
    sizeStage(ws.clientWidth, ws.clientHeight);
    ctx.clearRect(0, 0, stage.width, stage.height);
  }

  // Size the backing store to the workspace box × capped DPR; CSS keeps layout px.
  function sizeStage(cssW, cssH) {
    const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.DPR_CAP);
    stage.style.width = cssW + "px";
    stage.style.height = cssH + "px";
    stage.width = Math.max(1, Math.round(cssW * dpr));
    stage.height = Math.max(1, Math.round(cssH * dpr));
    return dpr;
  }

  // Mode-aware preview. Frame mode: render the actual output rectangle (at the
  // selected ratio) letterboxed on the gray stage, composed by `compositor`.
  function draw() {
    const ws = document.getElementById("workspace");
    const src = activeSource();
    if (!src) { clear(); return; }
    const dpr = sizeStage(ws.clientWidth, ws.clientHeight);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, ws.clientWidth, ws.clientHeight);

    if (state.mode === "frame") {
      const f = state.frame;
      const eff = effective(src);
      const r = compositor.frameRatio(f, eff.w, eff.h);
      // Preview shape uses a stable nominal size; only the ratio matters here.
      const shape = geometryCore.canvasDimsForRatio(r.w, r.h, 1200);
      const fit = geometryCore.computeContainRect(shape.Cw, shape.Ch, ws.clientWidth, ws.clientHeight);
      ctx.save();
      ctx.translate(fit.x, fit.y);
      ctx.scale(fit.scale, fit.scale);
      // Draw the (possibly cropped) image at full resolution.
      compositor.composeFrame(ctx, eff.bitmap, eff.w, eff.h, shape.Cw, shape.Ch, f);
      ctx.restore();
      ctx.strokeStyle = "rgba(0,0,0,.28)";
      ctx.lineWidth = 1;
      ctx.strokeRect(fit.x + 0.5, fit.y + 0.5, fit.w - 1, fit.h - 1);
      return;
    }

    if (state.mode === "crop") {
      cropMode.drawPreview(ctx, ws.clientWidth, ws.clientHeight);
      return;
    }

    if (state.mode === "collage") {
      collageMode.drawPreview(ctx, ws.clientWidth, ws.clientHeight);
      return;
    }

    if (state.mode === "carousel") {
      carouselMode.drawPreview(ctx, ws.clientWidth, ws.clientHeight);
      return;
    }

    // Fallback: plain contain preview from full-res.
    const fit = geometryCore.computeContainRect(src.w, src.h, ws.clientWidth, ws.clientHeight);
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(src.bitmap, fit.x, fit.y, fit.w, fit.h);
  }

  return { useActive, draw, clear, activeSource, sizeStage, effective, bakeCrop, bakeCropActive };
})();

/* ===========================================================================
 * exporter — full-resolution render ON DEMAND, then release. Uses the full-res
 * source bitmap (not the preview bitmap) so output is the real resolution. The
 * export canvas defaults to sRGB → P3/AdobeRGB sources are normalized to sRGB,
 * which is exactly what Instagram expects.
 * ======================================================================== */
const exporter = (function () {

  function tsName(ratio, ext) {
    const d = new Date();
    const p = (n) => String(n).padStart(2, "0");
    const stamp = "" + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + "_" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
    return "bingkai_" + ratio.replace(":", "x") + "_" + stamp + "." + ext;
  }

  function canvasToBlob(canvas, type, quality) {
    return new Promise((resolve, reject) => {
      canvas.toBlob((b) => (b ? resolve(b) : reject(new Error("toBlob null"))), type, quality);
    });
  }

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  let _forceDownload = false; // when true, skip the share sheet and save to device

  async function deliver(blob, filename) {
    const file = new File([blob], filename, { type: blob.type });
    // Prefer the native share sheet on Android (lets user pick IG directly)
    // unless the user explicitly chose "save to device".
    if (!_forceDownload && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); ui.toast(STRINGS.shared); return; }
      catch (e) { if (e && e.name === "AbortError") return; /* fall through to download */ }
    }
    triggerDownload(blob, filename);
    ui.toast(STRINGS.downloaded);
  }

  // JSZip (the one CDN dependency) is loaded lazily on first carousel export so
  // it never blocks startup and never errors when offline. The P6 service worker
  // will precache this exact URL so it works offline after one online use.
  let _zipPromise = null;
  function ensureJSZip() {
    if (typeof JSZip !== "undefined") return Promise.resolve(true);
    if (_zipPromise) return _zipPromise;
    _zipPromise = new Promise((resolve) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js";
      s.onload = () => resolve(true);
      s.onerror = () => resolve(false);
      document.head.appendChild(s);
    });
    return _zipPromise;
  }

  // Multi-file delivery for carousel: share files[] → ZIP (JSZip) → per-file.
  async function deliverMany(files) {
    if (!_forceDownload && navigator.canShare && navigator.canShare({ files })) {
      try { await navigator.share({ files }); ui.toast(STRINGS.sharedN); return; }
      catch (e) { if (e && e.name === "AbortError") return; }
    }
    await ensureJSZip();
    if (typeof JSZip !== "undefined") {
      const zip = new JSZip();
      files.forEach((f) => zip.file(f.name, f));
      const blob = await zip.generateAsync({ type: "blob" });
      triggerDownload(blob, "carousel_" + files.length + "tile.zip");
      ui.toast(STRINGS.zipped);
      return;
    }
    for (const f of files) { triggerDownload(f, f.name); await new Promise((r) => setTimeout(r, 300)); }
    ui.toast(files.length + " " + STRINGS.downloadedN);
  }

  // Render the active source at full export resolution and deliver it.
  async function run() {
    const src = state.sources.find((s) => s.id === state.activeId);
    if (!src) return;
    const opt = state.exportOpt;
    const isCrop = state.mode === "crop";
    const isCollage = state.mode === "collage";

    // Resolve target dims + a draw routine per mode.
    let Cw, Ch, ratioLabel, draw;
    if (isCollage) {
      const r = collageMode.ratioNums();
      ({ Cw, Ch } = compositor.exportDims(r.w, r.h, opt.ig));
      ratioLabel = "kolase";
      draw = (ctx) => collageMode.drawComposite(ctx, Cw, Ch);
    } else if (isCrop) {
      const eb = cropMode.exportBox();                 // box in full-res source px
      const r = eb.ratio;                              // crop ratio numbers
      ({ Cw, Ch } = compositor.exportDims(r.w, r.h, opt.ig));
      ratioLabel = (src.crop && src.crop.ratio && src.crop.ratio !== "original") ? src.crop.ratio : "potong";
      draw = (ctx) => ctx.drawImage(src.bitmap, eb.box.x, eb.box.y, eb.box.w, eb.box.h, 0, 0, Cw, Ch);
    } else {
      const f = state.frame;
      const eff = renderer.effective(src);
      const r = compositor.frameRatio(f, eff.w, eff.h);
      ({ Cw, Ch } = compositor.exportDims(r.w, r.h, opt.ig));
      ratioLabel = f.ratio;
      draw = (ctx) => compositor.composeFrame(ctx, eff.bitmap, eff.w, eff.h, Cw, Ch, f);
    }

    ui.setBusy(true);
    let canvas = null;
    try {
      canvas = document.createElement("canvas");
      canvas.width = Cw; canvas.height = Ch;
      const ctx = canvas.getContext("2d", { alpha: opt.format === "png" });
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
      draw(ctx); // same geometry as the live preview

      const type = opt.format === "png" ? "image/png" : "image/jpeg";
      const quality = opt.format === "png" ? undefined : opt.quality;
      const blob = await canvasToBlob(canvas, type, quality);
      const ext = opt.format === "png" ? "png" : "jpg";
      await deliver(blob, tsName(ratioLabel, ext));
    } catch (e) {
      console.error("export failed", e);
      ui.toast(STRINGS.exportFail);
    } finally {
      // Release the export canvas immediately (memory discipline).
      if (canvas) { canvas.width = 0; canvas.height = 0; }
      ui.setBusy(false);
    }
  }

  // Build one framed File per photo (used by runBatch; exposed for testing).
  async function batchFiles() {
    const f = state.frame, opt = state.exportOpt;
    const type = opt.format === "png" ? "image/png" : "image/jpeg";
    const quality = opt.format === "png" ? undefined : opt.quality;
    const ext = opt.format === "png" ? "png" : "jpg";
    const files = [];
    let i = 0;
    for (const src of state.sources) {
      i++;
      const eff = renderer.effective(src);
      const r = compositor.frameRatio(f, eff.w, eff.h);
      const { Cw, Ch } = compositor.exportDims(r.w, r.h, opt.ig);
      const cv = document.createElement("canvas");
      cv.width = Cw; cv.height = Ch;
      const ctx = cv.getContext("2d", { alpha: opt.format === "png" });
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
      compositor.composeFrame(ctx, eff.bitmap, eff.w, eff.h, Cw, Ch, f);
      const blob = await canvasToBlob(cv, type, quality);
      const num = String(i).padStart(2, "0");
      files.push(new File([blob], "bingkai_" + f.ratio.replace(":", "x") + "_" + num + "." + ext, { type: blob.type }));
      cv.width = 0; cv.height = 0; // release each before the next
    }
    return files;
  }

  // Frame mode: export EVERY photo with the current frame settings, delivered
  // together (share sheet → ZIP → per-file). Falls back to single export when
  // there's only one photo.
  async function runBatch() {
    if (state.sources.length < 2) return run();
    ui.setBusy(true);
    try {
      await deliverMany(await batchFiles());
    } catch (e) {
      console.error("batch export failed", e);
      ui.toast(STRINGS.exportFail);
    } finally {
      ui.setBusy(false);
    }
  }

  // Run any export action with the share sheet suppressed (save to device).
  async function withDownload(fn) { _forceDownload = true; try { return await fn(); } finally { _forceDownload = false; } }
  async function save() { return withDownload(run); }
  async function saveBatch() { return withDownload(runBatch); }

  return { run, runBatch, batchFiles, save, saveBatch, withDownload, deliverMany, triggerDownload };
})();


/* ===========================================================================
 * cropMode — manual crop via Pointer Events. State is resolution-independent:
 * { ratio, zoom, cx, cy } with cx/cy as source fractions. computeCropBoxLocked
 * is scale-equivariant, so the SAME state yields the preview box (working dims)
 * and the export box (full-res dims). Gestures mutate zoom/cx/cy only.
 * ======================================================================== */
const cropMode = (function () {
  const stage = document.getElementById("stage");
  const pointers = new Map(); // pointerId -> {x,y}
  let pinchPrev = 0;

  // The crop transform lives ON the active source (per-image, non-destructive).
  // Default is identity (original ratio, zoom 1) so visiting Crop changes nothing
  // until the user picks a ratio or zooms.
  function cur() {
    const src = renderer.activeSource();
    if (!src) return null;
    if (!src.crop) src.crop = { ratio: "original", zoom: 1, cx: 0.5, cy: 0.5, flip: false, rotate: 0 };
    if (src.crop.flip === undefined) src.crop.flip = false;
    if (src.crop.rotate === undefined) src.crop.rotate = 0;
    return src.crop;
  }

  function ratioNums() {
    const src = renderer.activeSource();
    const c = cur();
    const base = geometryCore.parseRatio(c ? c.ratio : "original", src ? src.w : 1, src ? src.h : 1);
    // orientation flip: swap the aspect for non-square, non-original ratios
    if (c && c.flip && c.ratio !== "original" && base.w !== base.h) {
      return { w: base.h, h: base.w };
    }
    return base;
  }

  // true when the active ratio has a meaningful orientation (not square/original)
  function canFlip() {
    const c = cur();
    return !!c && c.ratio !== "original" && c.ratio !== "1:1";
  }

  async function applyChange() {
    await renderer.bakeCropActive();
    renderer.draw();
    ui.refreshFilmstrip();
    sessionStore.scheduleMeta();
  }

  // The crop FRAME is fixed: the chosen aspect ratio, contained in the stage.
  // The image pans/zooms underneath it (Instagram-style).
  function frameRect(wsW, wsH) {
    const r = ratioNums(), pad = 16;
    const shape = geometryCore.canvasDimsForRatio(r.w, r.h, 1000);
    const fit = geometryCore.computeContainRect(shape.Cw, shape.Ch, wsW - 2 * pad, wsH - 2 * pad);
    return { x: pad + fit.x, y: pad + fit.y, w: fit.w, h: fit.h };
  }

  // On-screen scale that maps the source crop box onto the fixed frame.
  function frameScale(fr, box) { return fr.w / box.w; }

  function boxFor(W, H) {
    const r = ratioNums(), c = cur();
    return geometryCore.computeCropBoxLocked({
      sourceW: W, sourceH: H, ratioW: r.w, ratioH: r.h,
      zoom: c.zoom, centerX: c.cx * W, centerY: c.cy * H,
    });
  }

  // Snap cx/cy to the clamped centre so state never drifts out of bounds.
  function syncCenterFrom(box, W, H) {
    const c = cur();
    c.cx = (box.x + box.w / 2) / W;
    c.cy = (box.y + box.h / 2) / H;
  }

  async function rotate90() {
    const src = renderer.activeSource(); const c = cur();
    if (!src || !c) return;
    c.rotate = ((c.rotate || 0) + 90) % 360;
    c.zoom = 1; c.cx = 0.5; c.cy = 0.5; // re-frame after the orientation change
    await importer.applyRotation(src, c.rotate);
    await applyChange();
  }

  async function reset() {
    const src = renderer.activeSource(); const c = cur();
    c.ratio = "original"; c.zoom = 1; c.cx = 0.5; c.cy = 0.5; c.flip = false;
    if (c.rotate) { c.rotate = 0; await importer.applyRotation(src, 0); }
    await applyChange();
  }

  function onDown(e) {
    if (state.mode !== "crop" || !renderer.activeSource()) return;
    stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) undo.begin();
    if (pointers.size === 2) pinchPrev = pinchDist();
  }
  function pinchDist() {
    const p = [...pointers.values()];
    return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
  }
  function pinchMid() {
    const p = [...pointers.values()];
    return { x: (p[0].x + p[1].x) / 2, y: (p[0].y + p[1].y) / 2 };
  }

  function onMove(e) {
    if (state.mode !== "crop" || !pointers.has(e.pointerId)) return;
    const src = renderer.activeSource();
    if (!src) return;
    const prev = pointers.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    const ws = document.getElementById("workspace");
    const fr = frameRect(ws.clientWidth, ws.clientHeight);
    const box = boxFor(src.w, src.h);
    const scale = frameScale(fr, box);

    if (pointers.size >= 2) {
      const d = pinchDist();
      if (pinchPrev > 0 && d > 0) {
        const mid = pinchMid();
        const sr = stage.getBoundingClientRect();
        // focal point as a fraction of the fixed frame
        const fx = geometryCore.clamp((mid.x - sr.left - fr.x) / fr.w, 0, 1);
        const fy = geometryCore.clamp((mid.y - sr.top - fr.y) / fr.h, 0, 1);
        const r = ratioNums(); const c = cur();
        const z = geometryCore.cropZoomAboutPoint({
          sourceW: src.w, sourceH: src.h, ratioW: r.w, ratioH: r.h,
          zoom: c.zoom, centerX: c.cx * src.w, centerY: c.cy * src.h,
          // Fixed frame: spreading fingers zooms the IMAGE in (smaller box ⇒ higher zoom).
          factor: d / pinchPrev, fx, fy,
        });
        c.zoom = z.zoom;
        c.cx = z.centerX / src.w;
        c.cy = z.centerY / src.h;
        syncCenterFrom(boxFor(src.w, src.h), src.w, src.h);
      }
      pinchPrev = d;
    } else {
      // Pan: the IMAGE follows the finger, so the source point under the frame
      // centre moves opposite to the drag.
      const c = cur();
      c.cx -= dx / (scale * src.w);
      c.cy -= dy / (scale * src.h);
      syncCenterFrom(boxFor(src.w, src.h), src.w, src.h);
    }
    renderer.draw();
  }

  function onUp(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchPrev = 0;
    // bake the (possibly changed) crop so other modes see it
    if (state.mode === "crop") { renderer.bakeCropActive().then(() => ui.refreshFilmstrip()); sessionStore.scheduleMeta(); }

    stage.addEventListener("pointerdown", onDown);
    stage.addEventListener("pointermove", onMove);
    stage.addEventListener("pointerup", onUp);
    stage.addEventListener("pointercancel", onUp);
  }

  // Fixed crop frame; the image is scaled/positioned so the export box maps onto
  // the frame, with the surrounding image dimmed. Image moves/zooms under the frame.
  function drawPreview(ctx, wsW, wsH) {
    const src = renderer.activeSource();
    if (!src) return;
    const fr = frameRect(wsW, wsH);
    const box = boxFor(src.w, src.h);
    const scale = frameScale(fr, box);
    const ix = fr.x - box.x * scale, iy = fr.y - box.y * scale;
    const iw = src.w * scale, ih = src.h * scale;

    ctx.imageSmoothingQuality = "high";
    // whole image, then a dim veil over everything, then the frame re-lit
    ctx.drawImage(src.bitmap, ix, iy, iw, ih);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillRect(0, 0, wsW, wsH);
    ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.rect(fr.x, fr.y, fr.w, fr.h); ctx.clip();
    ctx.drawImage(src.bitmap, ix, iy, iw, ih);
    ctx.restore();
    // frame border + rule-of-thirds (on the fixed frame)
    ctx.strokeStyle = "rgba(255,255,255,.95)"; ctx.lineWidth = 2;
    ctx.strokeRect(fr.x + 1, fr.y + 1, fr.w - 2, fr.h - 2);
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 1;
    for (let i = 1; i < 3; i++) {
      const gx = fr.x + (fr.w * i) / 3, gy = fr.y + (fr.h * i) / 3;
      ctx.beginPath(); ctx.moveTo(gx, fr.y); ctx.lineTo(gx, fr.y + fr.h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fr.x, gy); ctx.lineTo(fr.x + fr.w, gy); ctx.stroke();
    }
  }

  function exportBox() {
    const src = renderer.activeSource();
    return { box: boxFor(src.w, src.h), ratio: ratioNums() };
  }

  return { bind, reset, drawPreview, exportBox, ratioNums, cur, applyChange, canFlip, rotate90 };
})();

/* Asymmetric collage layouts (fractional cells in the inner area). These are
 * the non-uniform "magazine" arrangements beyond a plain rows×cols grid. */
const COLLAGE_TEMPLATES = [
  { id: "big-2r", n: 3, label: "1+2", cells: [
    { x: 0, y: 0, w: 0.62, h: 1 }, { x: 0.62, y: 0, w: 0.38, h: 0.5 }, { x: 0.62, y: 0.5, w: 0.38, h: 0.5 } ] },
  { id: "2-big", n: 3, label: "2+1", cells: [
    { x: 0, y: 0, w: 0.5, h: 0.4 }, { x: 0.5, y: 0, w: 0.5, h: 0.4 }, { x: 0, y: 0.4, w: 1, h: 0.6 } ] },
  { id: "big-3r", n: 4, label: "1+3", cells: [
    { x: 0, y: 0, w: 0.6, h: 1 },
    { x: 0.6, y: 0, w: 0.4, h: 1 / 3 }, { x: 0.6, y: 1 / 3, w: 0.4, h: 1 / 3 }, { x: 0.6, y: 2 / 3, w: 0.4, h: 1 / 3 } ] },
  { id: "wide-narrow", n: 2, label: "2:1", cells: [
    { x: 0, y: 0, w: 0.64, h: 1 }, { x: 0.64, y: 0, w: 0.36, h: 1 } ] },
  { id: "tri-121", n: 3, label: "1·2·1", cells: [
    { x: 0, y: 0, w: 0.25, h: 1 }, { x: 0.25, y: 0, w: 0.5, h: 1 }, { x: 0.75, y: 0, w: 0.25, h: 1 } ] },
  { id: "feat-3", n: 4, label: "Atas+3", cells: [
    { x: 0, y: 0, w: 1, h: 0.6 },
    { x: 0, y: 0.6, w: 1 / 3, h: 0.4 }, { x: 1 / 3, y: 0.6, w: 1 / 3, h: 0.4 }, { x: 2 / 3, y: 0.6, w: 1 / 3, h: 0.4 } ] },
];
function templateById(id) { return COLLAGE_TEMPLATES.find((t) => t.id === id) || null; }

/* ===========================================================================
 * collageMode — grid compositing. Tiling comes from the P1-tested
 * computeCollageLayout (exact integer cells, gutters exactly G). Each cell's
 * visible region is computeCropBoxLocked with the CELL's aspect ratio, so
 * per-cell cover + pan/zoom reuses tested math with no new geometry.
 * ======================================================================== */
const collageMode = (function () {
  const stage = document.getElementById("stage");
  const pointers = new Map();
  let pinchPrev = 0;
  let gesture = null;     // { idx, snapshot, moved }
  let hoverTarget = -1;   // cell index a swap-drag is hovering

  function sourceFor(id) { return state.sources.find((s) => s.id === id) || null; }

  function activeTemplate() { return state.collage.template ? templateById(state.collage.template) : null; }
  // Number of cells: template length when a template is active, else rows×cols.
  function cellCount() { const t = activeTemplate(); return t ? t.cells.length : state.collage.rows * state.collage.cols; }

  // Rebuild the cell array to cellCount(), assigning sources in order (cycling),
  // preserving each cell's transform/source where still valid.
  function ensureCells() {
    const co = state.collage, n = cellCount(), srcs = state.sources, cur = co.cells;
    const out = [];
    for (let i = 0; i < n; i++) {
      const prev = cur[i];
      const stillValid = prev && srcs.some((s) => s.id === prev.srcId);
      const srcId = stillValid ? prev.srcId : (srcs.length ? srcs[i % srcs.length].id : null);
      out.push(stillValid ? prev : { srcId, zoom: 1, cx: 0.5, cy: 0.5 });
    }
    co.cells = out;
    if (co.selected >= n) co.selected = 0;
  }

  // Re-distribute sources across cells in order (cycling), preserving per-cell
  // transforms by position. Called when the photo set or grid changes so that
  // newly added images actually appear (fixes "collage shows only first image").
  function assignSources() {
    ensureCells();
    const co = state.collage, srcs = state.sources;
    if (!srcs.length) return;
    co.cells.forEach((c, i) => { c.srcId = srcs[i % srcs.length].id; });
  }

  function ratioNums() {
    return geometryCore.parseRatio(state.collage.ratio, 1, 1); // presets only (no 'original')
  }

  // Integer-exact layout for a given canvas size, with a safe fallback if the
  // gutter/margin would starve the cells.
  function layoutFor(Cw, Ch) {
    const co = state.collage, mn = Math.min(Cw, Ch);
    const m = Math.round((co.marginPct / 100) * mn);
    const g = Math.round((co.gutterPct / 100) * mn);
    const t = activeTemplate();
    if (t) {
      try { return { cells: geometryCore.templateRects({ Cw, Ch, cells: t.cells, outerMargin: m, gutter: g }) }; }
      catch (_) { return { cells: geometryCore.templateRects({ Cw, Ch, cells: t.cells, outerMargin: 0, gutter: 0 }) }; }
    }
    try {
      return geometryCore.computeCollageLayout({ Cw, Ch, rows: co.rows, cols: co.cols, outerMargin: m, gutter: g });
    } catch (_) {
      return geometryCore.computeCollageLayout({ Cw, Ch, rows: co.rows, cols: co.cols, outerMargin: 0, gutter: 0 });
    }
  }

  // Preview placement: output rectangle (collage ratio) centered on the stage.
  function placement(wsW, wsH) {
    const r = ratioNums();
    const pad = 10;
    const shape = geometryCore.canvasDimsForRatio(r.w, r.h, 1000);
    const fit = geometryCore.computeContainRect(shape.Cw, shape.Ch, wsW - 2 * pad, wsH - 2 * pad);
    const vp = { x: pad + fit.x, y: pad + fit.y, w: fit.w, h: fit.h };
    return { vp, shape, scale: vp.w / shape.Cw };
  }

  // CSS cell rects for hit-testing & preview.
  function cellRectsCss(wsW, wsH) {
    const pl = placement(wsW, wsH);
    const lay = layoutFor(pl.shape.Cw, pl.shape.Ch);
    return lay.cells.map((c, i) => ({
      i,
      x: pl.vp.x + c.x * pl.scale, y: pl.vp.y + c.y * pl.scale,
      w: c.w * pl.scale, h: c.h * pl.scale,
    }));
  }

  function hit(rects, px, py) {
    for (const r of rects) if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) return r.i;
    return -1;
  }

  // Draw one cell's covered source region into destRect (current ctx space).
  function drawCellInto(ctx, cell, destRect) {
    const s = sourceFor(cell.srcId);
    ctx.save();
    ctx.beginPath(); ctx.rect(destRect.x, destRect.y, destRect.w, destRect.h); ctx.clip();
    if (!s) {
      ctx.fillStyle = "#333"; ctx.fillRect(destRect.x, destRect.y, destRect.w, destRect.h);
    } else {
      const eff = renderer.effective(s);
      const box = geometryCore.computeCropBoxLocked({
        sourceW: eff.w, sourceH: eff.h, ratioW: destRect.w, ratioH: destRect.h,
        zoom: cell.zoom, centerX: cell.cx * eff.w, centerY: cell.cy * eff.h,
      });
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(eff.bitmap, box.x, box.y, box.w, box.h, destRect.x, destRect.y, destRect.w, destRect.h);
    }
    ctx.restore();
  }

  // Re-clamp a cell's centre after pan/zoom so its image always covers the cell.
  function syncCell(cell, destRect) {
    const s = sourceFor(cell.srcId);
    if (!s) return;
    const eff = renderer.effective(s);
    const box = geometryCore.computeCropBoxLocked({
      sourceW: eff.w, sourceH: eff.h, ratioW: destRect.w, ratioH: destRect.h,
      zoom: cell.zoom, centerX: cell.cx * eff.w, centerY: cell.cy * eff.h,
    });
    cell.cx = (box.x + box.w / 2) / eff.w;
    cell.cy = (box.y + box.h / 2) / eff.h;
  }

  // ----- preview -----
  function drawPreview(ctx, wsW, wsH) {
    ensureCells();
    const co = state.collage;
    const pl = placement(wsW, wsH);
    const rects = cellRectsCss(wsW, wsH);
    // gutter color fills the whole output rect (gutters + outer margin show through)
    ctx.fillStyle = co.gutterColor;
    ctx.fillRect(pl.vp.x, pl.vp.y, pl.vp.w, pl.vp.h);
    rects.forEach((r) => drawCellInto(ctx, co.cells[r.i], r));
    // selection + swap-target overlays
    rects.forEach((r) => {
      if (r.i === hoverTarget) {
        ctx.strokeStyle = "#4A9EFF"; ctx.setLineDash([6, 4]); ctx.lineWidth = 3;
        ctx.strokeRect(r.x + 1.5, r.y + 1.5, r.w - 3, r.h - 3); ctx.setLineDash([]);
      } else if (r.i === co.selected) {
        ctx.strokeStyle = "#4A9EFF"; ctx.lineWidth = 2.5;
        ctx.strokeRect(r.x + 1.25, r.y + 1.25, r.w - 2.5, r.h - 2.5);
      }
    });
  }

  // ----- export (full-res composite into ctx of size Cw×Ch) -----
  function drawComposite(ctx, Cw, Ch) {
    ensureCells();
    const co = state.collage;
    ctx.fillStyle = co.gutterColor;
    ctx.fillRect(0, 0, Cw, Ch);
    const lay = layoutFor(Cw, Ch);
    lay.cells.forEach((c, i) => drawCellInto(ctx, co.cells[i], { x: c.x, y: c.y, w: c.w, h: c.h }));
  }

  // ----- gestures -----
  function onDown(e) {
    if (state.mode !== "collage" || !state.sources.length) return;
    stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) undo.begin();
    if (pointers.size === 2) { pinchPrev = pdist(); return; }
    const ws = document.getElementById("workspace");
    const sr = stage.getBoundingClientRect();
    const rects = cellRectsCss(ws.clientWidth, ws.clientHeight);
    const idx = hit(rects, e.clientX - sr.left, e.clientY - sr.top);
    if (idx < 0) return;
    state.collage.selected = idx;
    gesture = { idx, moved: 0, snapshot: { ...state.collage.cells[idx] } };
    hoverTarget = -1;
    renderer.draw();
  }
  function pdist() { const p = [...pointers.values()]; return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y); }
  function pmid() { const p = [...pointers.values()]; return { x: (p[0].x + p[1].x) / 2, y: (p[0].y + p[1].y) / 2 }; }

  function onMove(e) {
    if (state.mode !== "collage" || !pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const ws = document.getElementById("workspace");
    const wsW = ws.clientWidth, wsH = ws.clientHeight;
    const sr = stage.getBoundingClientRect();
    const rects = cellRectsCss(wsW, wsH);

    if (pointers.size >= 2) {
      const d = pdist();
      if (pinchPrev > 0 && d > 0) {
        const sel = state.collage.selected, cell = state.collage.cells[sel];
        const rect = rects[sel]; const s = sourceFor(cell.srcId);
        if (rect && s) {
          const eff = renderer.effective(s);
          const mid = pmid();
          const fx = geometryCore.clamp((mid.x - sr.left - rect.x) / rect.w, 0, 1);
          const fy = geometryCore.clamp((mid.y - sr.top - rect.y) / rect.h, 0, 1);
          const z = geometryCore.cropZoomAboutPoint({
            sourceW: eff.w, sourceH: eff.h, ratioW: rect.w, ratioH: rect.h,
            zoom: cell.zoom, centerX: cell.cx * eff.w, centerY: cell.cy * eff.h, factor: d / pinchPrev, fx, fy,
          });
          cell.zoom = z.zoom; cell.cx = z.centerX / eff.w; cell.cy = z.centerY / eff.h;
          syncCell(cell, rect);
        }
      }
      pinchPrev = d;
      hoverTarget = -1;
      renderer.draw();
      return;
    }
    if (!gesture) return;
    gesture.moved += Math.hypot(dx, dy);
    const overIdx = hit(rects, e.clientX - sr.left, e.clientY - sr.top);
    if (gesture.moved > 10 && overIdx >= 0 && overIdx !== gesture.idx) {
      // swap intent: revert any pan, highlight target
      state.collage.cells[gesture.idx] = { ...gesture.snapshot };
      hoverTarget = overIdx;
    } else {
      // pan the active cell
      hoverTarget = -1;
      const cell = state.collage.cells[gesture.idx], rect = rects[gesture.idx], s = sourceFor(cell.srcId);
      if (rect && s) {
        const eff = renderer.effective(s);
        const box = geometryCore.computeCropBoxLocked({
          sourceW: eff.w, sourceH: eff.h, ratioW: rect.w, ratioH: rect.h,
          zoom: cell.zoom, centerX: cell.cx * eff.w, centerY: cell.cy * eff.h,
        });
        cell.cx += (-dx * (box.w / rect.w)) / eff.w;
        cell.cy += (-dy * (box.h / rect.h)) / eff.h;
        syncCell(cell, rect);
      }
    }
    renderer.draw();
  }

  function onUp(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchPrev = 0;
    if (gesture && hoverTarget >= 0 && hoverTarget !== gesture.idx) {
      const cells = state.collage.cells;
      const t = cells[gesture.idx]; cells[gesture.idx] = cells[hoverTarget]; cells[hoverTarget] = t;
      state.collage.selected = hoverTarget;
    }
    hoverTarget = -1; gesture = null;
    if (state.mode === "collage") renderer.draw();
    sessionStore.scheduleMeta();
    if (pointers.size === 0) undo.commit();
  }

  function bind() {
    stage.addEventListener("pointerdown", onDown);
    stage.addEventListener("pointermove", onMove);
    stage.addEventListener("pointerup", onUp);
    stage.addEventListener("pointercancel", onUp);
  }

  return { bind, ensureCells, assignSources, drawPreview, drawComposite, ratioNums };
})();

/* ===========================================================================
 * carouselMode — seamless split. Tiles are forced to EQUAL width (Wc = N×tileW)
 * so boundaries land on exact multiples (computeCarouselBoundaries) — the seam
 * is pixel-perfect and IG performs no per-tile resize. Each tile is rendered
 * directly from the source (offset by -b[k]); the giant composite is never
 * materialised, so memory stays flat regardless of N.
 * ======================================================================== */
const carouselMode = (function () {
  const stage = document.getElementById("stage");
  let drag = null; // { lastX }

  // tileW: 1080 for IG (equal tiles → perfect seam), 1440 for hi-res.
  function composite() {
    const c = state.carousel, N = c.n;
    const r = geometryCore.parseRatio(c.tileRatio, 1, 1);
    const tileW = state.exportOpt.ig ? CONFIG.IG_WIDTH : 1440;
    const Hc = Math.round(tileW * (r.h / r.w));
    const Wc = N * tileW;                                   // exact equal tiles
    const b = geometryCore.computeCarouselBoundaries(Wc, N); // = k*tileW
    return { N, tileW, Hc, Wc, b };
  }

  // How the source maps onto the Wc×Hc composite.
  //  cover → a crop box (computeCropBoxLocked) with the composite's aspect, so
  //          zoom/cx/cy choose what's framed. fit → contained + letterboxed.
  //  `eff` is the effective drawable ({bitmap,w,h}) — cropped if a crop exists.
  function mapping(eff, Wc, Hc) {
    const c = state.carousel;
    if (c.fill === "fit") {
      return { mode: "fit", comp: geometryCore.computeFillRect(eff.w, eff.h, Wc, Hc, "fit") };
    }
    const box = geometryCore.computeCropBoxLocked({
      sourceW: eff.w, sourceH: eff.h, ratioW: Wc, ratioH: Hc,
      zoom: c.zoom, centerX: c.cx * eff.w, centerY: c.cy * eff.h,
    });
    return { mode: "cover", box };
  }

  // Re-clamp cx/cy after pan/zoom so the framed box stays inside the source.
  function syncPosition(eff, Wc, Hc) {
    const box = geometryCore.computeCropBoxLocked({
      sourceW: eff.w, sourceH: eff.h, ratioW: Wc, ratioH: Hc,
      zoom: state.carousel.zoom, centerX: state.carousel.cx * eff.w, centerY: state.carousel.cy * eff.h,
    });
    state.carousel.cx = (box.x + box.w / 2) / eff.w;
    state.carousel.cy = (box.y + box.h / 2) / eff.h;
  }

  // Draw tile k (composite columns [b[k],b[k+1])) into dest rect, using mapping.
  function drawTile(ctx, k, eff, map, b, Wc, Hc, dest) {
    const tileW = b[k + 1] - b[k];
    ctx.save();
    ctx.beginPath(); ctx.rect(dest.x, dest.y, dest.w, dest.h); ctx.clip();
    ctx.imageSmoothingQuality = "high";
    if (map.mode === "fit") {
      ctx.fillStyle = "#000"; ctx.fillRect(dest.x, dest.y, dest.w, dest.h);
      ctx.translate(dest.x, dest.y);
      ctx.scale(dest.w / tileW, dest.h / Hc);
      ctx.drawImage(eff.bitmap, map.comp.x - b[k], map.comp.y, map.comp.w, map.comp.h);
    } else {
      // cover: this tile is the horizontal slice [b[k],b[k+1]) of the framed box
      const box = map.box;
      const sx = box.x + (b[k] / Wc) * box.w;
      const sw = (tileW / Wc) * box.w;
      ctx.drawImage(eff.bitmap, sx, box.y, sw, box.h, dest.x, dest.y, dest.w, dest.h);
    }
    ctx.restore();
  }

  // Preview metrics (tile display size + horizontal pitch).
  function metrics(wsW, wsH) {
    const { tileW, Hc } = composite();
    const dispH = wsH * 0.78;
    const dispW = dispH * (tileW / Hc);
    const gut = Math.max(6, wsW * 0.025);
    return { dispW, dispH, pitch: dispW + gut };
  }

  function drawPreview(ctx, wsW, wsH) {
    const src = renderer.activeSource();
    if (!src) return;
    const eff = renderer.effective(src);
    const { N, Hc, Wc, b } = composite();
    const map = mapping(eff, Wc, Hc);
    const m = metrics(wsW, wsH);
    const c = state.carousel;
    c.pos = geometryCore.clamp(c.pos, 0, N - 1);
    const cx = wsW / 2, midY = wsH / 2;

    for (let k = 0; k < N; k++) {
      const x = cx + (k - c.pos) * m.pitch - m.dispW / 2;
      if (x + m.dispW < 0 || x > wsW) continue;
      const dest = { x, y: midY - m.dispH / 2, w: m.dispW, h: m.dispH };
      drawTile(ctx, k, eff, map, b, Wc, Hc, dest);
      ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 1;
      ctx.strokeRect(dest.x + 0.5, dest.y + 0.5, dest.w - 1, dest.h - 1);
    }
    // page dots
    const dotsY = midY + m.dispH / 2 + 22, dotR = 3.5, gap = 16;
    const totalW = (N - 1) * gap;
    for (let k = 0; k < N; k++) {
      const dx = cx - totalW / 2 + k * gap;
      ctx.beginPath(); ctx.arc(dx, dotsY, dotR, 0, Math.PI * 2);
      ctx.fillStyle = Math.round(c.pos) === k ? "#4A9EFF" : "rgba(255,255,255,.3)";
      ctx.fill();
    }
  }
