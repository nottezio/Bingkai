  const pointers = new Map();
  let pinchPrev = 0;

  function onDown(e) {
    if (state.mode !== "carousel" || !renderer.activeSource()) return;
    stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) undo.begin();
    if (pointers.size === 2) pinchPrev = pdist();
    else drag = { lastX: e.clientX, lastY: e.clientY, axis: null };
  }
  function pdist() { const p = [...pointers.values()]; return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y); }

  function onMove(e) {
    if (state.mode !== "carousel" || !pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const ws = document.getElementById("workspace");
    const m = metrics(ws.clientWidth, ws.clientHeight);
    const { N, Hc, Wc } = composite();
    const src = renderer.activeSource();
    const eff = src ? renderer.effective(src) : null;
    const c = state.carousel;

    if (pointers.size >= 2) {
      // pinch zoom about the image centre (cover only)
      const d = pdist();
      if (pinchPrev > 0 && d > 0 && c.fill === "cover" && eff) {
        const z = geometryCore.cropZoomAboutPoint({
          sourceW: eff.w, sourceH: eff.h, ratioW: Wc, ratioH: Hc,
          zoom: c.zoom, centerX: c.cx * eff.w, centerY: c.cy * eff.h, factor: d / pinchPrev, fx: 0.5, fy: 0.5,
        });
        c.zoom = z.zoom; c.cx = z.centerX / eff.w; c.cy = z.centerY / eff.h;
        syncPosition(eff, Wc, Hc);
      }
      pinchPrev = d;
      renderer.draw();
      return;
    }
    if (!drag) return;
    if (c.adjust !== "browse" && c.fill === "cover" && eff) {
      // free reposition: the image follows the finger in both axes
      const box = mapping(eff, Wc, Hc).box;
      c.cx -= (dx * ((box.w / N) / m.dispW)) / eff.w;
      c.cy -= (dy * (box.h / m.dispH)) / eff.h;
      syncPosition(eff, Wc, Hc);
    } else {
      // browse mode: lock axis — horizontal scrolls tiles, vertical repositions
      if (!drag.axis) {
        if (Math.abs(dx) > Math.abs(dy) + 2) drag.axis = "browse";
        else if (Math.abs(dy) > Math.abs(dx) + 2) drag.axis = "position";
      }
      if (drag.axis === "position" && c.fill === "cover" && eff) {
        const box = mapping(eff, Wc, Hc).box;
        c.cy -= (dy * (box.h / m.dispH)) / eff.h;
        syncPosition(eff, Wc, Hc);
      } else {
        c.pos = geometryCore.clamp(c.pos - dx / m.pitch, 0, N - 1);
      }
    }
    renderer.draw();
  }
  function onUp(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchPrev = 0;
    if (drag) { drag = null; state.carousel.pos = Math.round(state.carousel.pos); renderer.draw(); }
    sessionStore.scheduleMeta();
    if (pointers.size === 0) undo.commit();
  }
  function bind() {
    stage.addEventListener("pointerdown", onDown);
    stage.addEventListener("pointermove", onMove);
    stage.addEventListener("pointerup", onUp);
    stage.addEventListener("pointercancel", onUp);
  }

  // ----- export N tiles in upload order, sequentially (flat memory) -----
  async function exportTiles() {
    const src = renderer.activeSource();
    if (!src) return;
    const eff = renderer.effective(src);
    const { N, Hc, Wc, b } = composite();
    const map = mapping(eff, Wc, Hc);
    const opt = state.exportOpt;
    const ext = opt.format === "png" ? "png" : "jpg";
    const type = opt.format === "png" ? "image/png" : "image/jpeg";
    const names = geometryCore.carouselFilenames(N, "seamless", ext);

    ui.setBusy(true);
    try {
      const files = [];
      for (let k = 0; k < N; k++) {
        const w = b[k + 1] - b[k];
        const cv = document.createElement("canvas");
        cv.width = w; cv.height = Hc;
        const ctx = cv.getContext("2d", { alpha: opt.format === "png" });
        // same path as the preview → WYSIWYG
        drawTile(ctx, k, eff, map, b, Wc, Hc, { x: 0, y: 0, w, h: Hc });
        const quality = opt.format === "png" ? undefined : opt.quality;
        const blob = await new Promise((res) => cv.toBlob(res, type, quality));
        files.push(new File([blob], names[k], { type: blob.type }));
        cv.width = 0; cv.height = 0; // release each tile before the next
      }
      await exporter.deliverMany(files);
    } catch (e) {
      console.error("carousel export", e);
      ui.toast(STRINGS.exportFail);
    } finally {
      ui.setBusy(false);
    }
  }

  return { bind, drawPreview, exportTiles, composite, mapping, drawTile, syncPosition };
})();

    sessionStore.scheduleMeta();
  }

  function removeSource(id) {
    const idx = state.sources.findIndex((s) => s.id === id);
    if (idx < 0) return;
    const [src] = state.sources.splice(idx, 1);
    importer.disposeSource(src);
    sessionStore.delSource(id);
    if (state.activeId === id) {
      state.activeId = state.sources.length ? state.sources[Math.max(0, idx - 1)].id : null;
    }
    if (!state.sources.length) sessionStore.clearAll(); else sessionStore.scheduleMeta();
    renderer.useActive().then(() => {
      refreshFilmstrip(); refreshEmpty();
      if (state.mode === "collage") { collageMode.assignSources(); renderer.draw(); }
    });
  }

  function openPicker() { picker.value = ""; picker.click(); }

  function setMode(mode) {
    state.mode = mode;
    document.querySelectorAll(".mode").forEach((b) =>
      b.setAttribute("aria-selected", String(b.dataset.mode === mode)));
    document.getElementById("sheetFrame").classList.toggle("hidden", mode !== "frame");
    document.getElementById("sheetCrop").classList.toggle("hidden", mode !== "crop");
    document.getElementById("sheetCollage").classList.toggle("hidden", mode !== "collage");
    document.getElementById("sheetCarousel").classList.toggle("hidden", mode !== "carousel");
    if (mode === "frame") { updateExportNote(); renderer.draw(); }
    else if (mode === "crop") { syncCropControls(); renderer.draw(); }
    else if (mode === "collage") { collageMode.ensureCells(); syncCollageControls(); renderer.draw(); }
    else if (mode === "carousel") {
      state.carousel.pos = 0;
      pressGroup("#adjustSeg button", "adj", state.carousel.adjust);
      pressGroup("#fillSeg button", "fill", state.carousel.fill);
      document.getElementById("adjustSeg").style.display = state.carousel.fill === "cover" ? "" : "none";
      document.getElementById("carouselHint").textContent =
        (state.carousel.adjust === "browse") ? STRINGS.carouselHintBrowse : STRINGS.carouselHintMove;
      renderer.draw();
    }
    else toast(STRINGS.modeSoon);
    updateBatchBtn();
    sessionStore.scheduleMeta();
  }

  function bind() {
    document.getElementById("btnImport").addEventListener("click", openPicker);
    document.getElementById("btnAddTop").addEventListener("click", openPicker);
    picker.addEventListener("change", (e) => importer.importFiles(e.target.files));

    document.querySelectorAll(".mode").forEach((b) =>
      b.addEventListener("click", () => setMode(b.dataset.mode)));

    bindFrameControls();
    bindCropControls();
    bindCollageControls();
    bindCarouselControls();

    // Collapsible panel: hide the controls to enlarge the photo preview.
    document.getElementById("sheetHandle").addEventListener("click", () => {
      document.body.classList.toggle("sheets-collapsed");
      // re-fit the canvas across the height animation
      const t0 = performance.now();
      (function loop() {
        renderer.draw();
        if (performance.now() - t0 < 320) requestAnimationFrame(loop);
      })();
    });
    cropMode.bind();
    collageMode.bind();
    carouselMode.bind();

    // Keep the canvas crisp whenever the stage area actually changes size
    // (import layout settle, URL-bar show/hide, rotation) — fixes the "first
    // import looks compressed until you touch a control" issue at the source.
    if (typeof ResizeObserver !== "undefined") {
      let raf = 0;
      const ro = new ResizeObserver(() => {
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => renderer.draw());
      });
      ro.observe(document.getElementById("workspace"));
    }

    // Slider fill: paint the filled portion of the track (WebKit needs --fill).
    function setFill(el) {
      const min = +el.min || 0, max = +el.max || 100, v = +el.value;
      el.style.setProperty("--fill", ((v - min) / (max - min)) * 100 + "%");
    }
    document.addEventListener("input", (e) => {
      if (e.target && e.target.matches && e.target.matches('input[type="range"]')) setFill(e.target);
    }, true);
    refreshFills = () => document.querySelectorAll('input[type="range"]').forEach(setFill);
    refreshFills();

    // Persist last-used settings on any control interaction (debounced).
    ["sheetFrame", "sheetCollage", "sheetCarousel"].forEach((id) => {
      const el = document.getElementById(id);
      el.addEventListener("input", () => { persistence.scheduleSave(); sessionStore.scheduleMeta(); });
      el.addEventListener("click", () => { persistence.scheduleSave(); sessionStore.scheduleMeta(); });
    });

    // Drag & drop (desktop / Android with file DnD).
    ["dragenter", "dragover"].forEach((ev) =>
      workspace.addEventListener(ev, (e) => { e.preventDefault(); empty.classList.add("drag"); }));
    ["dragleave", "drop"].forEach((ev) =>
      workspace.addEventListener(ev, (e) => { e.preventDefault(); empty.classList.remove("drag"); }));
    workspace.addEventListener("drop", (e) => {
      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length)
        importer.importFiles(e.dataTransfer.files);
    });

    // Re-fit preview on viewport / orientation change (debounced).
    let rt = null;
    window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(() => renderer.draw(), 80); });
  }

  function updateUndo() {
    const b = document.getElementById("btnUndo");
    if (b) b.disabled = !undo.canUndo();
  }

  // Re-sync all controls + canvas to the current state (used after an undo).
  async function applyRestoredState() {
    await renderer.useActive();
    refreshFilmstrip();
    syncFrameControlsFromState();
    syncCropControls();
    syncCollageControls();
    setMode(state.mode);
    updateExportNote();
  }

  return { applyStrings, bind, setBusy, toast, refreshEmpty, refreshFilmstrip, setActive, setMode, updateExportNote, syncFrameControlsFromState, renderPresets, updateUndo, applyRestoredState };
})();

/* ===========================================================================
 * persistence — last-used settings + named presets in localStorage. Tolerates
 * absent/blocked storage (private mode) by no-opping. Presets capture the frame
 * + export profile (e.g. "IG 4:5 putih").
 * ======================================================================== */
const persistence = (function () {
  const SETTINGS = "bingkai.settings.v1";
  const PRESETS = "bingkai.presets.v1";
  function safeGet(k) { try { return localStorage.getItem(k); } catch (_) { return null; } }
  function safeSet(k, v) { try { localStorage.setItem(k, v); return true; } catch (_) { return false; } }

  function snapshot() {
    const f = state.frame, o = state.exportOpt, co = state.collage, c = state.carousel;
    return {
      frame: { ratio: f.ratio, flip: !!f.flip, marginPct: f.marginPct, frameColor: f.frameColor, bg: f.bg, blurStrength: f.blurStrength },
      exportOpt: { ig: o.ig, quality: o.quality, format: o.format },
      collage: { rows: co.rows, cols: co.cols, ratio: co.ratio, gutterPct: co.gutterPct, marginPct: co.marginPct, gutterColor: co.gutterColor },
      carousel: { n: c.n, tileRatio: c.tileRatio, fill: c.fill },
    };
  }
  function applySnapshot(s) {
    if (!s) return;
    Object.assign(state.frame, s.frame || {});
    Object.assign(state.exportOpt, s.exportOpt || {});
    Object.assign(state.collage, s.collage || {});
    Object.assign(state.carousel, s.carousel || {});
  }

  let saveT = null;
  function scheduleSave() {
    clearTimeout(saveT);
    saveT = setTimeout(() => safeSet(SETTINGS, JSON.stringify(snapshot())), 400);
  }
  function loadSettings() {
    const r = safeGet(SETTINGS);
    if (r) { try { applySnapshot(JSON.parse(r)); } catch (_) {} }
  }

  function listPresets() {
    const r = safeGet(PRESETS);
    if (!r) return [];
    try { return JSON.parse(r) || []; } catch (_) { return []; }
  }
  function savePreset(name) {
    const ps = listPresets(), snap = snapshot();
    const entry = { name, frame: snap.frame, exportOpt: snap.exportOpt };
    const i = ps.findIndex((p) => p.name === name);
    if (i >= 0) ps[i] = entry; else ps.push(entry);
    safeSet(PRESETS, JSON.stringify(ps));
    return ps;
  }
  function deletePreset(name) {
    const ps = listPresets().filter((p) => p.name !== name);
    safeSet(PRESETS, JSON.stringify(ps));
    return ps;
  }
  function applyPreset(name) {
    const p = listPresets().find((x) => x.name === name);
    if (!p) return false;
    Object.assign(state.frame, p.frame || {});
    Object.assign(state.exportOpt, p.exportOpt || {});
    return true;
  }

  return { safeGet, safeSet, scheduleSave, loadSettings, snapshot, listPresets, savePreset, deletePreset, applyPreset };
})();

/* ===========================================================================
 * pwa — inline manifest (data URI, inline SVG icon), service worker, install.
 * ======================================================================== */
const pwa = (function () {
  const ICON = "data:image/svg+xml," + encodeURIComponent(
    "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>" +
    "<rect width='512' height='512' rx='96' fill='#1C1C1C'/>" +
    "<rect x='120' y='120' width='272' height='272' rx='28' fill='none' stroke='#4A9EFF' stroke-width='30'/>" +
    "<rect x='196' y='196' width='120' height='120' rx='14' fill='#C8A96E'/></svg>");

  function installManifest() {
    const manifest = {
      name: "Studio Foto — Bingkai", short_name: "Bingkai",
      start_url: ".", scope: ".", display: "standalone",
      background_color: "#1C1C1C", theme_color: "#2A2A2A", lang: "id",
      icons: [
        { src: ICON, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
        { src: ICON, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" },
      ],
    };
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = "data:application/manifest+json," + encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(link);
    const al = document.createElement("link");
    al.rel = "apple-touch-icon"; al.href = ICON; document.head.appendChild(al);
    const fav = document.createElement("link");
    fav.rel = "icon"; fav.type = "image/svg+xml"; fav.href = ICON; document.head.appendChild(fav);
  }

  function registerSW() {
    if (!("serviceWorker" in navigator)) return;
    if (!/^https?:$/.test(location.protocol)) return; // SW needs http(s)/localhost
    // Reload once when an UPDATED worker takes control. Guarded so it never fires
    // on first install (no prior controller) or loops.
    const hadController = !!navigator.serviceWorker.controller;
    let refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing || !hadController) return;
      refreshing = true;
      location.reload();
    });
    navigator.serviceWorker.register("./sw.js").then((reg) => {
      if (reg.waiting && navigator.serviceWorker.controller) reg.waiting.postMessage("SKIP_WAITING");
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("SKIP_WAITING"); // activate the update immediately
          }
        });
      });
    }).catch((e) => console.warn("SW register failed", e));
  }

  let deferred = null;
  function wireInstall() {
    const btn = document.getElementById("btnInstall");
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault(); deferred = e; btn.style.display = "inline-flex";
    });
    btn.addEventListener("click", async () => {
      if (!deferred) return;
      deferred.prompt(); await deferred.userChoice; deferred = null; btn.style.display = "none";
    });
    window.addEventListener("appinstalled", () => { btn.style.display = "none"; });
  }

  return { installManifest, registerSW, wireInstall };
})();

/* ===========================================================================
 * boot
 * ======================================================================== */
/* ===========================================================================
 * sessionStore — persists the working set (imported photos + their crops +
 * collage cells + carousel position + active/mode) in IndexedDB so a reload
 * restores exactly where you left off. Original file blobs are stored once;
 * crops/edits live in a single debounced 'meta' record. Degrades silently if
 * IndexedDB is unavailable.
 * ======================================================================== */
const sessionStore = (function () {
  const DB = "bingkai-session", VER = 1;
  let dbp = null;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res) => {
      let r;
      try { r = indexedDB.open(DB, VER); } catch (_) { return res(null); }
      r.onupgradeneeded = () => {
        const db = r.result;
        if (!db.objectStoreNames.contains("sources")) db.createObjectStore("sources", { keyPath: "id" });
        if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta");
      };
      r.onsuccess = () => res(r.result);
      r.onerror = () => res(null);
    });
    return dbp;
  }
  async function putSource(rec) {
    const db = await open(); if (!db) return;
    try { db.transaction("sources", "readwrite").objectStore("sources").put(rec); } catch (_) {}
  }
  async function delSource(id) {
    const db = await open(); if (!db) return;
    try { db.transaction("sources", "readwrite").objectStore("sources").delete(id); } catch (_) {}
  }
  async function allSources() {
    const db = await open(); if (!db) return [];
    return new Promise((res) => {
      try {
        const rq = db.transaction("sources", "readonly").objectStore("sources").getAll();
        rq.onsuccess = () => res(rq.result || []); rq.onerror = () => res([]);
      } catch (_) { res([]); }
    });
  }
  async function getMeta() {
    const db = await open(); if (!db) return null;
    return new Promise((res) => {
      try {
        const rq = db.transaction("meta", "readonly").objectStore("meta").get("session");
        rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null);
      } catch (_) { res(null); }
    });
  }
  async function putMeta(m) {
    const db = await open(); if (!db) return;
    try { db.transaction("meta", "readwrite").objectStore("meta").put(m, "session"); } catch (_) {}
  }
  async function clearAll() {
    const db = await open(); if (!db) return;
    try {
      db.transaction("sources", "readwrite").objectStore("sources").clear();
      db.transaction("meta", "readwrite").objectStore("meta").clear();
    } catch (_) {}
  }

  function buildMeta() {
    const co = state.collage, c = state.carousel;
    const crops = {};
    state.sources.forEach((s) => { if (s.crop) crops[s.id] = s.crop; });
    return {
      order: state.sources.map((s) => s.id),
      activeId: state.activeId,
      mode: state.mode,
      crops,
      collage: { rows: co.rows, cols: co.cols, template: co.template, ratio: co.ratio, gutterPct: co.gutterPct, marginPct: co.marginPct, gutterColor: co.gutterColor, cells: co.cells, selected: co.selected },
      carousel: { n: c.n, tileRatio: c.tileRatio, fill: c.fill, adjust: c.adjust, pos: c.pos, zoom: c.zoom, cx: c.cx, cy: c.cy },
    };
  }
  let mt = null;
  function scheduleMeta() {
    clearTimeout(mt);
    mt = setTimeout(() => { putMeta(buildMeta()); }, 350);
  }

  // Restore a previous session. Returns true if anything was restored.
  async function restore() {
    let recs = [];
    try { recs = await allSources(); } catch (_) { recs = []; }
    if (!recs.length) return false;
    const meta = (await getMeta()) || {};
    const order = meta.order && meta.order.length ? meta.order : recs.map((r) => r.id);
    const byId = {}; recs.forEach((r) => { byId[r.id] = r; });
    const crops = meta.crops || {};
    for (const id of order) {
      const rec = byId[id];
      if (!rec) continue;
      try { await importer.restoreSource(rec, crops[id] || null); } catch (e) { console.warn("restore source failed", id, e); }
    }
    if (!state.sources.length) return false;
    if (meta.collage) Object.assign(state.collage, meta.collage);
    if (meta.carousel) Object.assign(state.carousel, meta.carousel);
    state.activeId = (meta.activeId && state.sources.some((s) => s.id === meta.activeId)) ? meta.activeId : state.sources[0].id;
    state.mode = meta.mode || "frame";
    // bake any crops so every mode shows the cropped image immediately
    for (const s of state.sources) {
      if (s.crop && s.crop.rotate) { try { await importer.applyRotation(s, s.crop.rotate); } catch (_) {} }
      if (s.crop) { try { await renderer.bakeCrop(s); } catch (_) {} }
    }
    return true;
  }

  return { putSource, delSource, allSources, getMeta, putMeta, clearAll, scheduleMeta, restore };
})();


/* ===========================================================================
 * undo — one snapshot stack of the edit-relevant state. begin() captures a
 * pending snapshot at the start of an action; commit() pushes it only if the
 * state actually changed. pop() restores. Covers crops, frame, collage,
 * carousel, active photo + mode — the things easy to change by accident.
 * ======================================================================== */
const undo = (function () {
  const MAX = 25;
  const stack = [];
  let pending = null;

  function snap() {
    return JSON.stringify({
      mode: state.mode, activeId: state.activeId,
      frame: state.frame, exportOpt: state.exportOpt,
      collage: state.collage, carousel: state.carousel,
      crops: state.sources.map((s) => ({ id: s.id, crop: s.crop })),
    });
  }
  function begin() { pending = snap(); }
  function commit() {
    if (pending && pending !== snap()) {
      stack.push(pending);
      if (stack.length > MAX) stack.shift();
      ui.updateUndo();
    }
    pending = null;
  }
  function canUndo() { return stack.length > 0; }

  async function pop() {
    if (!stack.length) return;
    const s = JSON.parse(stack.pop());
    state.mode = s.mode;
    if (state.sources.some((x) => x.id === s.activeId)) state.activeId = s.activeId;
    Object.assign(state.frame, s.frame);
    Object.assign(state.exportOpt, s.exportOpt);
    Object.assign(state.collage, s.collage);
    Object.assign(state.carousel, s.carousel);
    const byId = {}; s.crops.forEach((c) => { byId[c.id] = c.crop; });
    for (const src of state.sources) {
      src.crop = Object.prototype.hasOwnProperty.call(byId, src.id) ? byId[src.id] : src.crop;
      try { await importer.applyRotation(src, (src.crop && src.crop.rotate) || 0); } catch (_) {}
      try { await renderer.bakeCrop(src); } catch (_) {}
    }
    await ui.applyRestoredState();
    ui.updateUndo();
    sessionStore.scheduleMeta();
  }

  return { begin, commit, pop, canUndo };
})();


async function boot() {
  persistence.loadSettings();   // restore last-used global settings before wiring UI
  ui.applyStrings();
  ui.bind();
  ui.syncFrameControlsFromState();
  ui.renderPresets();
  pwa.installManifest();
  pwa.wireInstall();
  pwa.registerSW();

  // Restore the previous working session (photos + crops + edits), if any.
  let restored = false;
  try { restored = await sessionStore.restore(); } catch (_) {}
  if (restored) {
    await renderer.useActive();
    ui.refreshFilmstrip();
    ui.refreshEmpty();
    ui.setMode(state.mode || "frame");
    ui.updateExportNote();
  } else {
    ui.setMode("frame");
    ui.refreshEmpty();
    renderer.clear();
  }
}
document.addEventListener("DOMContentLoaded", boot);

// Expose a tiny hook so Playwright can drive imports without a real file dialog.
window.__app = { state, importer, renderer, ui, exporter, compositor, cropMode, collageMode, carouselMode, persistence, sessionStore, undo, geometryCore, CONFIG };
</script>
</body>
